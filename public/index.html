<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        #root { width: 100vw; height: 100vh; }
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00d4ff;
            z-index: 1000;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        #map {
            flex: 1;
            background: #0a0a0f;
        }
        .sidebar {
            width: 380px;
            background: rgba(20, 20, 30, 0.98);
            border-left: 1px solid #2a2a3e;
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 100;
        }
        .land-item {
            background: linear-gradient(135deg, #1a1a2e 0%, #1e1e35 100%);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #2a2a3e;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .land-item:hover {
            border-color: #00d4ff;
            transform: translateX(5px);
        }
        .land-item.epic { border-left: 3px solid #9945ff; }
        .land-item.rare { border-left: 3px solid #00d4ff; }
        .land-item.common { border-left: 3px solid #888; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            border: 1px solid #00d4ff;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }
        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        /* Custom hexagon markers */
        .hex-marker {
            width: 20px;
            height: 20px;
            background: currentColor;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .hex-marker:hover {
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Generate MASSIVE hexagon grid - covering all land densely
        function generateMassiveHexGrid() {
            const hexagons = [];
            let id = 1;
            
            // 8-degree spacing for dense coverage
            for (let lat = -70; lat <= 70; lat += 8) {
                for (let lng = -180; lng < 180; lng += 10) {
                    // Skip pure ocean (simplified check)
                    const isLikelyOcean = (
                        (lat > 15 && lat < 35 && lng > -160 && lng < -100) || // Pacific
                        (lat > -40 && lat < -5 && lng > -150 && lng < -90) || // Pacific south
                        (lat > -55 && lat < -30 && lng > -10 && lng < 70) || // Atlantic south
                        (lat > 25 && lat < 45 && lng > -50 && lng < -25) || // Atlantic north
                        (lat > -10 && lat < 10 && lng > 130 && lng < 180) // Pacific islands
                    );
                    
                    // Add even ocean hexes but fewer
                    if (!isLikelyOcean || Math.random() > 0.85) {
                        let rarity = 'common';
                        let price = 25 + Math.floor(Math.random() * 75);
                        let yield_rate = 2.0;
                        
                        // Polar = epic
                        if (Math.abs(lat) > 60) {
                            rarity = 'epic';
                            price = 300 + Math.floor(Math.random() * 400);
                            yield_rate = 4.0;
                        }
                        // Desert/remote = rare
                        else if (Math.abs(lat) > 40 || Math.abs(lng) > 130 || (Math.abs(lat) < 20 && Math.abs(lng) < 30)) {
                            rarity = 'rare';
                            price = 100 + Math.floor(Math.random() * 150);
                            yield_rate = 3.0;
                        }
                        
                        hexagons.push({
                            id: id++,
                            lat: lat + (Math.random() - 0.5) * 3,
                            lng: lng + (Math.random() - 0.5) * 4,
                            name: `Hex-${id.toString().padStart(4, '0')}`,
                            rarity,
                            price,
                            yield: yield_rate,
                            owned: id === 2,
                            dailyRent: (price * (yield_rate / 100) / 365).toFixed(4)
                        });
                    }
                }
            }
            return hexagons;
        }

        const LAND_PARCELS = generateMassiveHexGrid();

        function WorldMap({ lands, onSelect }) {
            const mapRef = useRef(null);

            useEffect(() => {
                const map = L.map('map', {
                    center: [20, 0],
                    zoom: 2,
                    minZoom: 2,
                    worldCopyJump: true,
                    zoomControl: false
                });

                // Dark theme tiles
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(map);

                // Add hexagon markers
                lands.forEach(land => {
                    const color = land.owned ? '#00ff88' : 
                                 land.rarity === 'epic' ? '#9945ff' : 
                                 land.rarity === 'rare' ? '#00d4ff' : '#666';
                    
                    const icon = L.divIcon({
                        className: 'custom-hex',
                        html: `<div class="hex-marker" style="background: ${color}; box-shadow: 0 0 8px ${color}"></div>`,
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    L.marker([land.lat, land.lng], { icon })
                        .addTo(map)
                        .bindTooltip(`${land.name}<br>$${land.price} · ${land.rarity}`, {direction: 'top'})
                        .on('click', () => onSelect(land));
                });

                mapRef.current = map;
                
                return () => map.remove();
            }, [lands, onSelect]);

            return <div id="map" />;
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(LAND_PARCELS);

            const owned = lands.filter(l => l.owned);
            const totalValue = owned.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = owned.reduce((sum, l) => sum + parseFloat(l.dailyRent), 0).toFixed(4);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.id === land.id ? {...l, owned: true} : l));
                alert(`Bought ${land.name}!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <div style={{display: 'flex', gap: '2rem'}}>
                            <span>Total Hex: <strong style={{color: '#00d4ff'}}>{lands.length}</strong></span>
                            <span>Owned: <strong style={{color: '#00ff88'}}>{owned.length}</strong></span>
                            <span>Value: <strong style={{color: '#00d4ff'}}>${totalValue.toLocaleString()}</strong></span>
                            <span>Daily: <strong style={{color: '#00ff88'}}>${dailyRent}</strong></span>
                        </div>
                        <button style={{background: 'linear-gradient(135deg, #00d4ff, #0099cc)', border: 'none', padding: '0.75rem 1.5rem', borderRadius: '8px', color: '#000', fontWeight: 'bold', cursor: 'pointer'}}>
                            Connect Wallet
                        </button>
                    </header>

                    <div className="main">
                        <WorldMap lands={lands} onSelect={setSelectedLand} />
                        <aside className="sidebar">
                            <h3 style={{color: '#888', marginBottom: '1rem', fontSize: '0.9rem', textTransform: 'uppercase'}}>
                                All Hexagons ({lands.length})
                            </h3>
                            <div style={{fontSize: '0.8rem', color: '#666', marginBottom: '1rem'}}>
                                Click any hexagon on the map to buy land
                            </div>
                            <div style={{maxHeight: 'calc(100vh - 200px)', overflowY: 'auto'}}>
                                {lands.slice(0, 100).map(land => (
                                    <div key={land.id} className={`land-item ${land.rarity}`} onClick={() => setSelectedLand(land)}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                            <span style={{fontWeight: 600}}>{land.name}</span>
                                            <span style={{color: land.rarity === 'epic' ? '#9945ff' : land.rarity === 'rare' ? '#00d4ff' : '#888', fontSize: '0.7rem', textTransform: 'uppercase'}}>{land.rarity}</span>
                                        </div>
                                        <div style={{fontSize: '0.85rem', color: '#888', marginTop: '0.25rem'}}>
                                            ${land.price} USDC · <span style={{color: '#00ff88'}}>+${land.dailyRent}/day</span>
                                        </div>
                                    </div>
                                ))}
                                {lands.length > 100 && (
                                    <div style={{textAlign: 'center', color: '#666', padding: '1rem', fontSize: '0.85rem'}}>
                                        ... and {lands.length - 100} more hexagons
                                    </div>
                                )}
                            </div>
                        </aside>
                    </div>

                    {selectedLand && (
                        <div className="modal-overlay" onClick={() => setSelectedLand(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2 style={{color: '#00d4ff', marginBottom: '1.5rem'}}>{selectedLand.name}</h2>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Location</span>
                                    <span>{selectedLand.lat.toFixed(2)}°, {selectedLand.lng.toFixed(2)}°</span>
                                </div>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Rarity</span>
                                    <span style={{color: selectedLand.rarity === 'epic' ? '#9945ff' : selectedLand.rarity === 'rare' ? '#00d4ff' : '#888', textTransform: 'capitalize'}}>{selectedLand.rarity}</span>
                                </div>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Price</span>
                                    <span>${selectedLand.price} USDC</span>
                                </div>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Annual Yield</span>
                                    <span style={{color: '#00ff88'}}>{selectedLand.yield}%</span>
                                </div>
                                <div style={{marginBottom: '1rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Daily Rent</span>
                                    <span style={{color: '#00ff88'}}>${selectedLand.dailyRent}</span>
                                </div>
                                {!selectedLand.owned && (
                                    <button className="buy-btn" onClick={() => {handleBuy(selectedLand); setSelectedLand(null);}}>
                                        Buy for ${selectedLand.price} USDC
                                    </button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
