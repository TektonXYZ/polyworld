<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav-item {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .nav-item.active {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wallet-btn:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: #14141e;
            border-right: 1px solid #2a2a3e;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 1.5rem;
            border-bottom: 1px solid #2a2a3e;
        }

        .sidebar-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 1rem;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stat-card {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        /* Land List */
        .land-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .land-item {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            transition: all 0.3s;
        }

        .land-item:hover {
            border-color: #00d4ff;
            background: #1e1e35;
        }

        .land-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .land-name {
            font-weight: 600;
        }

        .land-rarity {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .land-rarity.common {
            background: #3a3a4e;
            color: #888;
        }

        .land-rarity.rare {
            background: #1a4a6e;
            color: #00d4ff;
        }

        .land-rarity.epic {
            background: #4a1a6e;
            color: #9945ff;
        }

        .land-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
        }

        .land-yield {
            color: #00ff88;
        }

        /* Map Container */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Buy Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #00d4ff;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2a3e;
        }

        .modal-label {
            color: #888;
        }

        .modal-value {
            font-weight: 600;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 1.5rem;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Mock data for demonstration
        const MOCK_LAND = [
            { id: 1, name: "NYC Block 8472", lat: 40.7128, lng: -74.0060, rarity: "common", price: 100, yield: 2.0, owned: true, dailyRent: 0.0055 },
            { id: 2, name: "Antarctica Sector 12", lat: -82.8628, lng: -135.0000, rarity: "epic", price: 500, yield: 4.0, owned: true, dailyRent: 0.055 },
            { id: 3, name: "Tokyo District 5", lat: 35.6762, lng: 139.6503, rarity: "common", price: 120, yield: 2.0, owned: false, dailyRent: 0.0066 },
            { id: 4, name: "Sahara Zone 44", lat: 23.4162, lng: 25.6628, rarity: "rare", price: 250, yield: 3.0, owned: false, dailyRent: 0.0205 },
        ];

        // Stats Component
        function Stats({ totalLand, totalValue, dailyRent }) {
            return (
                <div className="sidebar-section">
                    <div className="sidebar-title">Your Portfolio</div>
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Land Owned</div>
                            <div className="stat-value">{totalLand}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Total Value</div>
                            <div className="stat-value">${totalValue}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Daily Rent</div>
                            <div className="stat-value" style={{color: '#00ff88'}}>${dailyRent}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">APY</div>
                            <div className="stat-value">2.8%</div>
                        </div>
                    </div>
                </div>
            );
        }

        // Land List Component
        function LandList({ lands, onSelect }) {
            const ownedLand = lands.filter(l => l.owned);
            
            return (
                <div className="sidebar-section">
                    <div className="sidebar-title">Your Land</div>
                    <div className="land-grid">
                        {ownedLand.map(land => (
                            <div key={land.id} className="land-item" onClick={() => onSelect(land)}>
                                <div className="land-header">
                                    <span className="land-name">{land.name}</span>
                                    <span className={`land-rarity ${land.rarity}`}>{land.rarity}</span>
                                </div>
                                <div className="land-details">
                                    <span>${land.price}</span>
                                    <span className="land-yield">+${land.dailyRent}/day</span>
                                </div>
                            </div>
                        ))}
                        {ownedLand.length === 0 && (
                            <div style={{color: '#888', textAlign: 'center', padding: '2rem'}}>
                                No land yet. Click on the map to buy!
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Buy Modal Component
        function BuyModal({ land, onClose, onBuy }) {
            if (!land) return null;

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="close-btn" onClick={onClose}>×</button>
                        <h2 className="modal-title">Buy Land</h2>
                        
                        <div className="modal-row">
                            <span className="modal-label">Location</span>
                            <span className="modal-value">{land.name}</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Rarity</span>
                            <span className="modal-value" style={{textTransform: 'capitalize'}}>{land.rarity}</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Price</span>
                            <span className="modal-value">${land.price} USDC</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Annual Yield</span>
                            <span className="modal-value" style={{color: '#00ff88'}}>{land.yield}%</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Daily Rent</span>
                            <span className="modal-value" style={{color: '#00ff88'}}>${land.dailyRent}/day</span>
                        </div>

                        <button className="buy-btn" onClick={() => onBuy(land)}>
                            Buy for ${land.price} USDC
                        </button>
                    </div>
                </div>
            );
        }

        // Map Component
        function Map({ onParcelClick }) {
            const mapContainer = useRef(null);
            const map = useRef(null);
            const markers = useRef([]);

            useEffect(() => {
                // Initialize Mapbox
                mapboxgl.accessToken = 'pk.eyJ1IjoiZGVtbyIsImEiOiJja2V0b3V3b3YwMHBpMnJ0ZzB4M3ZvZ2lnIn0.demo_token';
                
                map.current = new mapboxgl.Map({
                    container: mapContainer.current,
                    style: 'mapbox://styles/mapbox/dark-v11',
                    center: [0, 20],
                    zoom: 2,
                    projection: 'globe'
                });

                map.current.on('load', () => {
                    // Add markers for available land
                    MOCK_LAND.forEach(land => {
                        const color = land.owned ? '#00ff88' : (land.rarity === 'epic' ? '#9945ff' : land.rarity === 'rare' ? '#00d4ff' : '#888');
                        
                        const marker = new mapboxgl.Marker({ color })
                            .setLngLat([land.lng, land.lat])
                            .setPopup(new mapboxgl.Popup().setHTML(`<h3>${land.name}</h3><p>$${land.price} - ${land.rarity}</p>`))
                            .addTo(map.current);

                        marker.getElement().addEventListener('click', () => {
                            onParcelClick(land);
                        });

                        markers.current.push(marker);
                    });
                });

                return () => {
                    map.current?.remove();
                };
            }, [onParcelClick]);

            return <div ref={mapContainer} id="map" />;
        }

        // Main App
        function App() {
            const [activeTab, setActiveTab] = useState('map');
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(MOCK_LAND);
            const [walletConnected, setWalletConnected] = useState(false);

            const ownedLand = lands.filter(l => l.owned);
            const totalValue = ownedLand.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = ownedLand.reduce((sum, l) => sum + l.dailyRent, 0);

            const handleBuy = (land) => {
                // Simulate buying
                const updatedLands = lands.map(l => 
                    l.id === land.id ? { ...l, owned: true } : l
                );
                setLands(updatedLands);
                setSelectedLand(null);
                alert(`Bought ${land.name} for $${land.price} USDC!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <nav className="nav">
                            <div className={`nav-item ${activeTab === 'map' ? 'active' : ''}`} onClick={() => setActiveTab('map')}>
                                World Map
                            </div>
                            <div className={`nav-item ${activeTab === 'portfolio' ? 'active' : ''}`} onClick={() => setActiveTab('portfolio')}>
                                Portfolio
                            </div>
                            <div className={`nav-item ${activeTab === 'market' ? 'active' : ''}`} onClick={() => setActiveTab('market')}>
                                Marketplace
                            </div>
                        </nav>
                        <button className="wallet-btn" onClick={() => setWalletConnected(!walletConnected)}>
                            {walletConnected ? '0x1234...5678' : 'Connect Wallet'}
                        </button>
                    </header>

                    <div className="main">
                        <aside className="sidebar">
                            <Stats 
                                totalLand={ownedLand.length} 
                                totalValue={totalValue}
                                dailyRent={dailyRent.toFixed(4)}
                            />
                            <LandList lands={lands} onSelect={setSelectedLand} />
                        </aside>

                        <div className="map-container">
                            <Map onParcelClick={setSelectedLand} />
                        </div>
                    </div>

                    {selectedLand && (
                        <BuyModal 
                            land={selectedLand} 
                            onClose={() => setSelectedLand(null)}
                            onBuy={handleBuy}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
