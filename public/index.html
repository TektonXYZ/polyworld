        // Generate land hexagons - FLIPPED RARITY (populated = rare/epic)
        function generateLandHexagons() {
            const hexagons = [];
            
            LAND_COORDINATES.forEach((coord, index) => {
                // FLIPPED: High population = RARE/Epic, Low population = COMMON
                let rarity, price, yield_rate;
                
                if (coord.pop === "high") {
                    // Cities = EPIC (most valuable)
                    rarity = "epic";
                    price = 500 + Math.floor(Math.random() * 500);
                    yield_rate = 4.0;
                } else if (coord.pop === "medium") {
                    // Medium cities = RARE
                    rarity = "rare";
                    price = 200 + Math.floor(Math.random() * 200);
                    yield_rate = 3.0;
                } else {
                    // Remote = COMMON (least valuable)
                    rarity = "common";
                    price = 50 + Math.floor(Math.random() * 100);
                    yield_rate = 2.0;
                }
                
                hexagons.push({
                    id: index + 1,
                    lat: coord.lat,
                    lng: coord.lng,
                    name: coord.name,
                    rarity,
                    price,
                    yield: yield_rate,
                    owned: index === 0,
                    population: coord.pop,
                    dailyRent: (price * (yield_rate / 100) / 365).toFixed(4)
                });
            });
            
            return hexagons;
        }

        const LAND_PARCELS = generateLandHexagons();

        // Wallet Connection Hook
        function useWallet() {
            const [wallet, setWallet] = useState(null);
            const [connected, setConnected] = useState(false);
            const [connecting, setConnecting] = useState(false);

            const connect = async () => {
                setConnecting(true);
                try {
                    // Check for Phantom wallet
                    if (window.solana && window.solana.isPhantom) {
                        const response = await window.solana.connect();
                        setWallet(response.publicKey.toString());
                        setConnected(true);
                        console.log('Connected:', response.publicKey.toString());
                    } else {
                        // Open Phantom website if not installed
                        window.open('https://phantom.app/', '_blank');
                        alert('Please install Phantom wallet and refresh the page');
                    }
                } catch (err) {
                    console.error('Connection error:', err);
                    alert('Failed to connect wallet: ' + err.message);
                } finally {
                    setConnecting(false);
                }
            };

            const disconnect = async () => {
                if (window.solana) {
                    await window.solana.disconnect();
                }
                setWallet(null);
                setConnected(false);
            };

            // Auto-check if already connected
            useEffect(() => {
                const checkConnection = async () => {
                    if (window.solana && window.solana.isPhantom) {
                        try {
                            const response = await window.solana.connect({ onlyIfTrusted: true });
                            if (response) {
                                setWallet(response.publicKey.toString());
                                setConnected(true);
                            }
                        } catch (e) {
                            // Not connected, that's fine
                        }
                    }
                };
                checkConnection();
            }, []);

            return { wallet, connected, connecting, connect, disconnect };
        }

        function WorldMap({ lands, onSelect }) {
            useEffect(() => {
                const map = L.map('map', { center: [20, 0], zoom: 2, minZoom: 2, worldCopyJump: true });
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
                }).addTo(map);

                lands.forEach(land => {
                    // FLIPPED COLORS: Epic = gold/yellow (cities), Common = gray (remote)
                    const color = land.owned ? '#00ff88' : 
                                 land.rarity === 'epic' ? '#ffd700' :  // Gold for cities
                                 land.rarity === 'rare' ? '#00d4ff' :   // Cyan for medium
                                 '#666';                                   // Gray for remote
                    
                    const icon = L.divIcon({
                        className: 'custom-hex',
                        html: `<div class="hex-marker" style="background: ${color}; box-shadow: 0 0 10px ${color}"></div>`,
                        iconSize: [12, 12], iconAnchor: [6, 6]
                    });

                    L.marker([land.lat, land.lng], { icon })
                        .addTo(map)
                        .bindTooltip(`<b>${land.name}</b><br>Pop: ${land.population}<br>$${land.price} · ${land.rarity}${land.owned ? ' · OWNED' : ''}`, {direction: 'top'})
                        .on('click', () => onSelect(land));
                });

                return () => map.remove();
            }, [lands, onSelect]);

            return <div id="map" style={{flex: 1}} />;
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(LAND_PARCELS);
            const { wallet, connected, connecting, connect, disconnect } = useWallet();

            const owned = lands.filter(l => l.owned);
            const myLand = lands.filter(l => l.owned); // Will be filtered by wallet later
            const myValue = myLand.reduce((sum, l) => sum + l.price, 0);
            const myDaily = myLand.reduce((sum, l) => sum + parseFloat(l.dailyRent), 0);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.id === land.id ? {...l, owned: true} : l));
                alert(`Bought ${land.name}!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <div style={{display: 'flex', gap: '2rem', alignItems: 'center'}}>
                            <span>Total: <strong style={{color: '#00d4ff'}}>{lands.length}</strong></span>
                            <span>Owned: <strong style={{color: '#00ff88'}}>{owned.length}</strong></span>
                            {connected && (
                                <span style={{fontSize: '0.85rem', color: '#888'}}>
                                    {wallet.slice(0, 6)}...{wallet.slice(-4)}
                                </span>
                            )}
                            <button 
                                className={`wallet-btn ${connected ? 'connected' : ''}`}
                                onClick={connected ? disconnect : connect}
                                disabled={connecting}
                            >
                                {connecting ? 'Connecting...' : connected ? 'Disconnect' : 'Connect Phantom'}
                            </button>
                        </div>
                    </header>

                    <div className="main">
                        <WorldMap lands={lands} onSelect={setSelectedLand} />
                        <aside className="sidebar">
                            <h3 style={{color: '#888', marginBottom: '0.5rem', fontSize: '0.9rem', textTransform: 'uppercase'}}>
                                Available Land ({lands.length})
                            </h3>
                            <div style={{fontSize: '0.8rem', color: '#ffd700', marginBottom: '1rem', padding: '0.5rem', background: 'rgba(255,215,0,0.1)', borderRadius: '6px'}}>
                                ⭐ Cities = EPIC (high value) | 🏔️ Remote = COMMON
                            </div>
                            <div style={{maxHeight: 'calc(100vh - 200px)', overflowY: 'auto'}}>
                                {lands.map(land => (
                                    <div key={land.id} className={`land-item ${land.rarity}`} onClick={() => setSelectedLand(land)}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                            <span style={{fontWeight: 600}}>{land.name}</span>
                                            <span style={{color: land.rarity === 'epic' ? '#ffd700' : land.rarity === 'rare' ? '#00d4ff' : '#888', fontSize: '0.7rem', textTransform: 'uppercase'}}>{land.rarity}</span>
                                        </div>
                                        <div style={{fontSize: '0.85rem', color: '#888', marginTop: '0.25rem'}}>
                                            Pop: {land.population} · ${land.price} · <span style={{color: '#00ff88'}}>+${land.dailyRent}/day</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>
                    </div>

                    {selectedLand && (
                        <div className="modal-overlay" onClick={() => setSelectedLand(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2 style={{color: selectedLand.rarity === 'epic' ? '#ffd700' : '#00d4ff', marginBottom: '1rem'}}>{selectedLand.name}</h2>
                                <div style={{marginBottom: '0.5rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Population</span>
                                    <span style={{textTransform: 'capitalize', color: selectedLand.population === 'high' ? '#ffd700' : selectedLand.population === 'medium' ? '#00d4ff' : '#888'}}>{selectedLand.population}</span>
                                </div>
                                <div style={{marginBottom: '0.5rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Rarity</span>
                                    <span style={{color: selectedLand.rarity === 'epic' ? '#ffd700' : selectedLand.rarity === 'rare' ? '#00d4ff' : '#888', textTransform: 'capitalize'}}>{selectedLand.rarity}</span>
                                </div>
                                <div style={{marginBottom: '0.5rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Price</span>
                                    <span>${selectedLand.price} USDC</span>
                                </div>
                                <div style={{marginBottom: '0.5rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Yield</span>
                                    <span style={{color: '#00ff88'}}>{selectedLand.yield}% APY</span>
                                </div>
                                <div style={{marginBottom: '1rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Daily Rent</span>
                                    <span style={{color: '#00ff88'}}>${selectedLand.dailyRent}</span>
                                </div>
                                {!selectedLand.owned && (
                                    <button className="buy-btn" onClick={() => {handleBuy(selectedLand); setSelectedLand(null);}}>
                                        Buy for ${selectedLand.price} USDC
                                    </button>
                                )}
                                {selectedLand.owned && (
                                    <div style={{textAlign: 'center', color: '#00ff88', padding: '1rem', background: 'rgba(0,255,136,0.1)', borderRadius: '8px'}}>
                                        ✓ You own this land
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
