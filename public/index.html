<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        #root { width: 100vw; height: 100vh; }
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00d4ff;
            z-index: 1000;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats-bar {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }
        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }
        .wallet-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        .main {
            flex: 1;
            display: flex;
            position: relative;
        }
        #globe-container {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, #0a0a1f 0%, #000 100%);
        }
        .sidebar {
            width: 380px;
            background: rgba(20, 20, 30, 0.95);
            border-left: 1px solid #2a2a3e;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .land-item {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }
        .land-item:hover {
            border-color: #00d4ff;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #00d4ff;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }
        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { latLngToCell, cellToLatLng, getHexagonEdgeLengthAvg, UNITS } = h3;

        // Generate hexagon grid covering Earth
        function generateHexGrid() {
            const hexagons = [];
            let id = 1;
            
            // Generate hexagons at resolution 3 (~100km)
            // Cover major land areas with sample points
            const landPoints = [
                // North America
                {lat: 45, lng: -100}, {lat: 35, lng: -110}, {lat: 40, lng: -75},
                {lat: 50, lng: -120}, {lat: 30, lng: -95}, {lat: 55, lng: -110},
                // South America
                {lat: -15, lng: -55}, {lat: -25, lng: -65}, {lat: -35, lng: -60},
                // Europe
                {lat: 50, lng: 10}, {lat: 45, lng: 5}, {lat: 55, lng: -5},
                {lat: 40, lng: 15}, {lat: 52, lng: 20},
                // Africa
                {lat: 0, lng: 20}, {lat: -15, lng: 25}, {lat: -25, lng: 30},
                {lat: 5, lng: 5}, {lat: -20, lng: 15},
                // Asia
                {lat: 35, lng: 105}, {lat: 25, lng: 80}, {lat: 55, lng: 85},
                {lat: 40, lng: 70}, {lat: 30, lng: 120}, {lat: 45, lng: 130},
                // Australia
                {lat: -25, lng: 135}, {lat: -35, lng: 145},
                // Remote/Premium locations
                {lat: 65, lng: -18}, {lat: -80, lng: 0}, {lat: 20, lng: -155},
            ];
            
            landPoints.forEach(point => {
                try {
                    const h3Index = latLngToCell(point.lat, point.lng, 3);
                    const center = cellToLatLng(h3Index);
                    
                    // Determine rarity based on location
                    let rarity = 'common';
                    let price = 100;
                    let yield_rate = 2.0;
                    
                    // Remote = rare/epic
                    if (Math.abs(point.lat) > 60 || Math.abs(point.lat) < -60) {
                        rarity = 'epic';
                        price = 500 + Math.floor(Math.random() * 300);
                        yield_rate = 4.0;
                    } else if (Math.abs(point.lng) > 140 || Math.abs(point.lat) > 45) {
                        rarity = 'rare';
                        price = 200 + Math.floor(Math.random() * 100);
                        yield_rate = 3.0;
                    } else {
                        price = 50 + Math.floor(Math.random() * 100);
                    }
                    
                    hexagons.push({
                        id: id++,
                        h3Index,
                        lat: center[0],
                        lng: center[1],
                        name: `Hex-${h3Index.slice(-6)}`,
                        rarity,
                        price,
                        yield: yield_rate,
                        owned: id === 2, // First one owned
                        dailyRent: (price * (yield_rate / 100) / 365).toFixed(4)
                    });
                } catch(e) {}
            });
            
            return hexagons;
        }

        const LAND_PARCELS = generateHexGrid();

        function latLngToVector3(lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(radius * Math.sin(phi) * Math.cos(theta)),
                (radius * Math.cos(phi)),
                (radius * Math.sin(phi) * Math.sin(theta))
            );
        }

        function Globe3D({ lands, onSelect }) {
            const containerRef = useRef(null);
            const markersRef = useRef([]);
            const raycasterRef = useRef(new THREE.Raycaster());
            const mouseRef = useRef(new THREE.Vector2());
            const isDraggingRef = useRef(false);

            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.z = 2.5;

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                containerRef.current.appendChild(renderer.domElement);

                // Earth
                const earth = new THREE.Mesh(
                    new THREE.SphereGeometry(1, 64, 64),
                    new THREE.MeshPhongMaterial({
                        color: 0x1a3a5e,
                        emissive: 0x0a1a2e,
                        emissiveIntensity: 0.5
                    })
                );
                scene.add(earth);

                // Grid
                const grid = new THREE.Mesh(
                    new THREE.SphereGeometry(1.005, 32, 32),
                    new THREE.MeshBasicMaterial({
                        color: 0x00d4ff,
                        wireframe: true,
                        transparent: true,
                        opacity: 0.08
                    })
                );
                scene.add(grid);

                // Atmosphere
                scene.add(new THREE.Mesh(
                    new THREE.SphereGeometry(1.15, 32, 32),
                    new THREE.MeshBasicMaterial({
                        color: 0x00d4ff,
                        transparent: true,
                        opacity: 0.05,
                        side: THREE.BackSide
                    })
                ));

                // Lights
                scene.add(new THREE.AmbientLight(0x404040, 2));
                scene.add(new THREE.DirectionalLight(0xffffff, 1).position.set(5, 3, 5));

                // Stars
                const starsGeometry = new THREE.BufferGeometry();
                const starsCount = 3000;
                const posArray = new Float32Array(starsCount * 3);
                for(let i = 0; i < starsCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 200;
                }
                starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                scene.add(new THREE.Points(starsGeometry, new THREE.PointsMaterial({ size: 0.015, color: 0xffffff })));

                // Hexagon markers
                lands.forEach(land => {
                    const geometry = new THREE.CylinderGeometry(0.025, 0.025, 0.015, 6);
                    const color = land.owned ? 0x00ff88 : 
                                 land.rarity === 'epic' ? 0x9945ff : 
                                 land.rarity === 'rare' ? 0x00d4ff : 0x888888;
                    
                    const hex = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color }));
                    const pos = latLngToVector3(land.lat, land.lng, 1.02);
                    hex.position.copy(pos);
                    hex.lookAt(new THREE.Vector3(0, 0, 0));
                    hex.rotateX(Math.PI);
                    hex.userData = { land };
                    scene.add(hex);
                    markersRef.current.push(hex);

                    // Glow
                    const glow = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.035, 0.035, 0.01, 6),
                        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.25 })
                    );
                    glow.position.copy(pos);
                    glow.lookAt(new THREE.Vector3(0, 0, 0));
                    glow.rotateX(Math.PI);
                    scene.add(glow);
                });

                // Animation
                let animationId;
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    if (!isDraggingRef.current) {
                        earth.rotation.y += 0.0005;
                        grid.rotation.y += 0.0005;
                    }
                    renderer.render(scene, camera);
                };
                animate();

                // Events
                const handleMouseDown = (e) => { isDraggingRef.current = true; };
                const handleMouseUp = () => { isDraggingRef.current = false; };
                const handleClick = (e) => {
                    if (isDraggingRef.current) return;
                    const rect = renderer.domElement.getBoundingClientRect();
                    mouseRef.current.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    mouseRef.current.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    raycasterRef.current.setFromCamera(mouseRef.current, camera);
                    const intersects = raycasterRef.current.intersectObjects(markersRef.current);
                    if (intersects.length > 0) onSelect(intersects[0].object.userData.land);
                };

                renderer.domElement.addEventListener('mousedown', handleMouseDown);
                renderer.domElement.addEventListener('mouseup', handleMouseUp);
                renderer.domElement.addEventListener('click', handleClick);

                return () => {
                    cancelAnimationFrame(animationId);
                    renderer.domElement.removeEventListener('mousedown', handleMouseDown);
                    renderer.domElement.removeEventListener('mouseup', handleMouseUp);
                    renderer.domElement.removeEventListener('click', handleClick);
                    containerRef.current?.removeChild(renderer.domElement);
                };
            }, [lands, onSelect]);

            return <div id="globe-container" ref={containerRef} style={{flex: 1}} />;
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(LAND_PARCELS);

            const owned = lands.filter(l => l.owned);
            const totalValue = owned.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = owned.reduce((sum, l) => sum + parseFloat(l.dailyRent), 0).toFixed(4);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.id === land.id ? {...l, owned: true} : l));
                alert(`Bought ${land.name}!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <div className="stats-bar">
                            <div>Land: <span className="stat-value">{owned.length}/{lands.length}</span></div>
                            <div>Value: <span className="stat-value">${totalValue.toLocaleString()}</span></div>
                            <div>Daily: <span className="stat-value" style={{color: '#00ff88'}}>${dailyRent}</span></div>
                        </div>
                        <button className="wallet-btn">Connect Wallet</button>
                    </header>

                    <div className="main">
                        <Globe3D lands={lands} onSelect={setSelectedLand} />
                        <aside className="sidebar">
                            <h3 style={{color: '#888', marginBottom: '1rem', textTransform: 'uppercase', fontSize: '0.9rem'}}>
                                Available Hexagons
                            </h3>
                            <div style={{marginBottom: '1rem', fontSize: '0.85rem', color: '#666'}}>
                                {lands.length} hexagons covering all land areas. Click on globe to buy.
                            </div>
                            <div>
                                {lands.filter(l => !l.owned).slice(0, 20).map(land => (
                                    <div key={land.id} className="land-item" onClick={() => setSelectedLand(land)}>
                                        <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                            <span>{land.name}</span>
                                            <span style={{color: land.rarity === 'epic' ? '#9945ff' : land.rarity === 'rare' ? '#00d4ff' : '#888', textTransform: 'uppercase', fontSize: '0.7rem'}}>{land.rarity}</span>
                                        </div>
                                        <div style={{fontSize: '0.8rem', color: '#888', marginTop: '0.25rem'}}>
                                            ${land.price} · <span style={{color: '#00ff88'}}>+${land.dailyRent}/day</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>
                    </div>

                    {selectedLand && (
                        <div className="modal-overlay" onClick={() => setSelectedLand(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2 style={{color: '#00d4ff', marginBottom: '1rem'}}>{selectedLand.name}</h2>
                                <div style={{marginBottom: '0.5rem'}}>Rarity: <span style={{textTransform: 'capitalize', color: selectedLand.rarity === 'epic' ? '#9945ff' : selectedLand.rarity === 'rare' ? '#00d4ff' : '#888'}}>{selectedLand.rarity}</span></div>
                                <div style={{marginBottom: '0.5rem'}}>Price: ${selectedLand.price} USDC</div>
                                <div style={{marginBottom: '0.5rem'}}>Yield: <span style={{color: '#00ff88'}}>{selectedLand.yield}%</span></div>
                                <div style={{marginBottom: '1rem'}}>Daily Rent: <span style={{color: '#00ff88'}}>${selectedLand.dailyRent}</span></div>
                                {!selectedLand.owned && (
                                    <button className="buy-btn" onClick={() => {handleBuy(selectedLand); setSelectedLand(null);}}>
                                        Buy for ${selectedLand.price} USDC
                                    </button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
