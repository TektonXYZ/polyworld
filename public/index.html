        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; }
        #root { width: 100vw; height: 100vh; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00d4ff; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #9945ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main { flex: 1; display: flex; overflow: hidden; }
        #map { flex: 1; background: #0a0a0f; }
        .sidebar { width: 350px; background: rgba(20, 20, 30, 0.98); border-left: 1px solid #2a2a3e; padding: 1rem; overflow-y: auto; z-index: 100; }
        .land-item { background: linear-gradient(135deg, #1a1a2e 0%, #1e1e35 100%); padding: 0.6rem; border-radius: 8px; border: 1px solid #2a2a3e; margin-bottom: 0.4rem; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .land-item:hover { border-color: #00d4ff; transform: translateX(5px); }
        .land-item.epic { border-left: 3px solid #ffd700; }
        .land-item.rare { border-left: 3px solid #00d4ff; }
        .land-item.common { border-left: 3px solid #888; }
        .wallet-btn { background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 0.6rem 1.2rem; border-radius: 6px; color: #000; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .wallet-btn.connected { background: linear-gradient(135deg, #00ff88, #00cc6a); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 12px; border: 1px solid #00d4ff; padding: 1.5rem; max-width: 380px; width: 90%; }
        .buy-btn { width: 100%; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 0.8rem; border-radius: 6px; color: #000; font-weight: bold; cursor: pointer; margin-top: 0.8rem; }
        .buy-btn:disabled { background: #555; cursor: not-allowed; }
        .stats-bar { display: flex; gap: 1.5rem; font-size: 0.9rem; }
        .continent-filter { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .filter-btn { background: #2a2a3e; border: 1px solid #3a3a4e; color: #fff; padding: 0.35rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .filter-btn:hover, .filter-btn.active { background: #00d4ff; color: #000; }
        .city-count { color: #00d4ff; font-weight: bold; }
    </style>

            const [filter, setFilter] = useState('All');

                }).addTo(map);

                    const price = Math.floor(Math.random() * (tier.price[1] - tier.price[0]) + tier.price[0]);

                        radius: 6,
                        fillColor: tier.color,
                        color: '#fff',
                        weight: 1,
                        opacity: 0.8,
                        fillOpacity: 0.8
                    }).addTo(map).bindPopup(`<b>${city.name}</b><br/>${city.country}`).on('click', () => setSelectedCity({...city, price}));

                return () => map.remove();
            }, []);

            const connectWallet = async () => {

                    try {
                        const resp = await window.solana.connect();
                        setWallet(resp.publicKey.toString());
                    } catch (err) {

                    }

                }

                        </div>

                    </header>

                        <div className="sidebar">

                                    </button>
                                ))}
                            </div>

                                    const price = Math.floor(Math.random() * (tier.price[1] - tier.price[0]) + tier.price[0]);
                                    return (
                                        <div key={idx} className={`land-item ${city.pop}`} onClick={() => setSelectedCity({...city, price})}>
                                            <strong>{city.name}</strong> - {city.country}
                                            <br/><small style={{color: tier.color}}>{tier.label} • ${price}</small>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    {selectedCity && (
                        <div className="modal-overlay" onClick={() => setSelectedCity(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2>{selectedCity.name}</h2>
                                <p>{selectedCity.country} • {selectedCity.continent}</p>
                                <p style={{color: TIERS[selectedCity.pop].color}}>{TIERS[selectedCity.pop].label}</p>
                                <p>Price: <strong>${selectedCity.price}</strong></p>
                                <button className="buy-btn" onClick={() => {setOwnedLands([...ownedLands, selectedCity]); setSelectedCity(null);}} disabled={!wallet}>
                                    {wallet ? 'Buy Land' : 'Connect Wallet'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
