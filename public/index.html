<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: #14141e;
            border-right: 1px solid #2a2a3e;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .land-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .land-item {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            transition: all 0.3s;
        }

        .land-item:hover {
            border-color: #00d4ff;
        }

        .land-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .land-location {
            font-size: 0.8rem;
            color: #888;
        }

        .map-placeholder {
            flex: 1;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
        }

        .globe-visual {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a3a5e, #0a0a1f);
            box-shadow: 
                0 0 60px rgba(0, 212, 255, 0.3),
                inset -20px -20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            border-radius: 50%;
        }

        .land-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .land-dot:hover {
            transform: scale(1.5);
            box-shadow: 0 0 20px currentColor;
        }

        .land-dot.common { background: #888; }
        .land-dot.rare { background: #00d4ff; }
        .land-dot.epic { background: #9945ff; }
        .land-dot.owned { background: #00ff88; }

        .placeholder-text {
            margin-top: 2rem;
            color: #888;
            font-size: 1.2rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #00d4ff;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2a3e;
        }

        .modal-label {
            color: #888;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MOCK_LAND = [
            { id: 1, name: "NYC Block 8472", lat: 40.7, lng: -74.0, rarity: "common", price: 100, yield: 2.0, owned: true, dailyRent: 0.0055 },
            { id: 2, name: "Antarctica Sector 12", lat: -82.8, lng: -135.0, rarity: "epic", price: 500, yield: 4.0, owned: false, dailyRent: 0.055 },
            { id: 3, name: "Tokyo District 5", lat: 35.6, lng: 139.6, rarity: "common", price: 120, yield: 2.0, owned: false, dailyRent: 0.0066 },
            { id: 4, name: "Sahara Zone 44", lat: 23.4, lng: 25.6, rarity: "rare", price: 250, yield: 3.0, owned: false, dailyRent: 0.0205 },
            { id: 5, name: "Amazon Plot 7", lat: -3.4, lng: -62.2, rarity: "rare", price: 180, yield: 3.0, owned: false, dailyRent: 0.0148 },
        ];

        function Stats({ totalLand, totalValue, dailyRent }) {
            return (
                <div>
                    <div className="sidebar-title">Your Portfolio</div>
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Land Owned</div>
                            <div className="stat-value">{totalLand}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Total Value</div>
                            <div className="stat-value">${totalValue}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Daily Rent</div>
                            <div className="stat-value" style={{color: '#00ff88'}}>${dailyRent}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">APY</div>
                            <div className="stat-value">2.8%</div>
                        </div>
                    </div>
                </div>
            );
        }

        function LandList({ lands, onSelect }) {
            const owned = lands.filter(l => l.owned);
            return (
                <div>
                    <div className="sidebar-title">Your Land</div>
                    <div className="land-list">
                        {owned.map(land => (
                            <div key={land.id} className="land-item" onClick={() => onSelect(land)}>
                                <div className="land-name">{land.name}</div>
                                <div className="land-location">${land.price} · {land.rarity} · +${land.dailyRent}/day</div>
                            </div>
                        ))}
                        {owned.length === 0 && (
                            <div style={{color: '#888', textAlign: 'center', padding: '2rem'}}>
                                Click land on globe to buy!
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Globe({ lands, onSelect }) {
            return (
                <div className="map-placeholder">
                    <div className="globe-visual">
                        <div className="grid-overlay"></div>
                        {lands.map((land, i) => {
                            const x = 50 + (land.lng / 360) * 80;
                            const y = 50 - (land.lat / 180) * 80;
                            const className = `land-dot ${land.owned ? 'owned' : land.rarity}`;
                            return (
                                <div
                                    key={land.id}
                                    className={className}
                                    style={{left: x + '%', top: y + '%'}}
                                    onClick={() => onSelect(land)}
                                    title={land.name}
                                />
                            );
                        })}
                    </div>
                    <div className="placeholder-text">PolyWorld Globe Visualization</div>
                    <div style={{color: '#666', marginTop: '0.5rem'}}>Click dots to buy land</div>
                </div>
            );
        }

        function BuyModal({ land, onClose, onBuy }) {
            if (!land) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <h2 className="modal-title">{land.owned ? 'Your Land' : 'Buy Land'}</h2>
                        <div className="modal-row">
                            <span className="modal-label">Location</span>
                            <span>{land.name}</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Rarity</span>
                            <span style={{textTransform: 'capitalize'}}>{land.rarity}</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Price</span>
                            <span>${land.price} USDC</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Annual Yield</span>
                            <span style={{color: '#00ff88'}}>{land.yield}%</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Daily Rent</span>
                            <span style={{color: '#00ff88'}}>${land.dailyRent}/day</span>
                        </div>
                        {!land.owned && (
                            <button className="buy-btn" onClick={() => {onBuy(land); onClose();}}>
                                Buy for ${land.price} USDC
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(MOCK_LAND);
            const [walletConnected, setWalletConnected] = useState(false);

            const owned = lands.filter(l => l.owned);
            const totalValue = owned.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = owned.reduce((sum, l) => sum + l.dailyRent, 0);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.id === land.id ? {...l, owned: true} : l));
                alert(`Bought ${land.name}!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <button className="wallet-btn" onClick={() => setWalletConnected(!walletConnected)}>
                            {walletConnected ? '0x1234...5678' : 'Connect Wallet'}
                        </button>
                    </header>

                    <div className="main">
                        <aside className="sidebar">
                            <Stats totalLand={owned.length} totalValue={totalValue} dailyRent={dailyRent.toFixed(4)} />
                            <LandList lands={lands} onSelect={setSelectedLand} />
                        </aside>

                        <Globe lands={lands} onSelect={setSelectedLand} />
                    </div>

                    {selectedLand && (
                        <BuyModal 
                            land={selectedLand} 
                            onClose={() => setSelectedLand(null)}
                            onBuy={handleBuy}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
