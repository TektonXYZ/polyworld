<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.0/lib/index.iife.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; }
        #root { width: 100vw; height: 100vh; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00d4ff; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #9945ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main { flex: 1; display: flex; overflow: hidden; }
        #map { flex: 1; background: #0a0a0f; }
        .sidebar { width: 380px; background: rgba(20, 20, 30, 0.98); border-left: 1px solid #2a2a3e; padding: 1.5rem; overflow-y: auto; z-index: 100; }
        .land-item { background: linear-gradient(135deg, #1a1a2e 0%, #1e1e35 100%); padding: 0.75rem; border-radius: 10px; border: 1px solid #2a2a3e; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; }
        .land-item:hover { border-color: #00d4ff; transform: translateX(5px); }
        .land-item.epic { border-left: 3px solid #9945ff; }
        .land-item.rare { border-left: 3px solid #00d4ff; }
        .land-item.common { border-left: 3px solid #888; }
        .wallet-btn { background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 0.75rem 1.5rem; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .wallet-btn:hover { box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .wallet-btn.connected { background: linear-gradient(135deg, #00ff88, #00cc6a); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 16px; border: 1px solid #00d4ff; padding: 2rem; max-width: 420px; width: 90%; }
        .buy-btn { width: 100%; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 1rem; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 1rem; }
        .hex-marker { width: 14px; height: 14px; background: currentColor; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); border: 1px solid rgba(255,255,255,0.5); cursor: pointer; transition: transform 0.2s; }
        .hex-marker:hover { transform: scale(1.5); }
        .loading { display: flex; align-items: center; justify-content: center; height: 100px; color: #00d4ff; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Connection, PublicKey, LAMPORTS_PER_SOL } = solanaWeb3;

        // COMPREHENSIVE LAND MASK - Only places hexagons on actual land
        function isLand(lat, lng) {
            // Normalize longitude
            lng = ((lng + 180) % 360) - 180;
            
            // Define land regions (continents and major islands)
            const landRegions = [
                // NORTH AMERICA
                { name: "North America", bounds: [{lat: 15, lng: -170}, {lat: 15, lng: -50}, {lat: 75, lng: -50}, {lat: 75, lng: -170}] },
                
                // SOUTH AMERICA  
                { name: "South America", bounds: [{lat: -60, lng: -85}, {lat: -60, lng: -30}, {lat: 15, lng: -30}, {lat: 15, lng: -85}] },
                
                // EUROPE
                { name: "Europe", bounds: [{lat: 35, lng: -25}, {lat: 35, lng: 45}, {lat: 72, lng: 45}, {lat: 72, lng: -25}] },
                
                // AFRICA
                { name: "Africa", bounds: [{lat: -40, lng: -20}, {lat: -40, lng: 55}, {lat: 38, lng: 55}, {lat: 38, lng: -20}] },
                
                // ASIA (mainland)
                { name: "Asia", bounds: [{lat: 5, lng: 40}, {lat: 5, lng: 180}, {lat: 77, lng: 180}, {lat: 77, lng: 40}] },
                
                // AUSTRALIA
                { name: "Australia", bounds: [{lat: -45, lng: 110}, {lat: -45, lng: 155}, {lat: -10, lng: 155}, {lat: -10, lng: 110}] },
                
                // GREENLAND
                { name: "Greenland", bounds: [{lat: 60, lng: -75}, {lat: 60, lng: -12}, {lat: 84, lng: -12}, {lat: 84, lng: -75}] },
                
                // NEW ZEALAND
                { name: "New Zealand", bounds: [{lat: -48, lng: 165}, {lat: -48, lng: 179}, {lat: -34, lng: 179}, {lat: -34, lng: 165}] },
                
                // MADAGASCAR
                { name: "Madagascar", bounds: [{lat: -26, lng: 43}, {lat: -26, lng: 51}, {lat: -12, lng: 51}, {lat: -12, lng: 43}] },
                
                // JAPAN
                { name: "Japan", bounds: [{lat: 30, lng: 129}, {lat: 30, lng: 146}, {lat: 46, lng: 146}, {lat: 46, lng: 129}] },
                
                // UK & IRELAND
                { name: "UK", bounds: [{lat: 50, lng: -11}, {lat: 50, lng: 2}, {lat: 59, lng: 2}, {lat: 59, lng: -11}] },
                
                // ICELAND
                { name: "Iceland", bounds: [{lat: 63, lng: -25}, {lat: 63, lng: -13}, {lat: 67, lng: -13}, {lat: 67, lng: -25}] },
                
                // CARIBBEAN / CENTRAL AMERICA
                { name: "Caribbean", bounds: [{lat: 7, lng: -95}, {lat: 7, lng: -58}, {lat: 28, lng: -58}, {lat: 28, lng: -95}] },
                
                // INDONESIA / MALAYSIA
                { name: "Indonesia", bounds: [{lat: -11, lng: 95}, {lat: -11, lng: 142}, {lat: 7, lng: 142}, {lat: 7, lng: 95}] },
                
                // PHILIPPINES
                { name: "Philippines", bounds: [{lat: 5, lng: 117}, {lat: 5, lng: 127}, {lat: 20, lng: 127}, {lat: 20, lng: 117}] },
                
                // PAPUA NEW GUINEA
                { name: "PNG", bounds: [{lat: -12, lng: 141}, {lat: -12, lng: 157}, {lat: 0, lng: 157}, {lat: 0, lng: 141}] },
                
                // SRI LANKA
                { name: "Sri Lanka", bounds: [{lat: 6, lng: 80}, {lat: 6, lng: 82}, {lat: 10, lng: 82}, {lat: 10, lng: 80}] },
                
                // TAIWAN
                { name: "Taiwan", bounds: [{lat: 22, lng: 120}, {lat: 22, lng: 122}, {lat: 26, lng: 122}, {lat: 26, lng: 120}] },
                
                // HAWAII
                { name: "Hawaii", bounds: [{lat: 19, lng: -155}, {lat: 19, lng: -154}, {lat: 20, lng: -154}, {lat: 20, lng: -155}] },
                
                // FIJI
                { name: "Fiji", bounds: [{lat: -19, lng: 177}, {lat: -19, lng: 179}, {lat: -16, lng: 179}, {lat: -16, lng: 177}] },
                
                // MEDITERRANEAN ISLANDS (Sicily, Sardinia, etc)
                { name: "Med Islands", bounds: [{lat: 35, lng: 8}, {lat: 35, lng: 30}, {lat: 47, lng: 30}, {lat: 47, lng: 8}] },
                
                // ALASKA
                { name: "Alaska", bounds: [{lat: 51, lng: -179}, {lat: 51, lng: -130}, {lat: 72, lng: -130}, {lat: 72, lng: -179}] },
            ];
            
            // Check if point is in any land region
            for (const region of landRegions) {
                const b = region.bounds;
                if (lat >= b[0].lat && lat <= b[2].lat && 
                    lng >= b[0].lng && lng <= b[1].lng) {
                    return true;
                }
            }
            
            // Detailed exclusions (water within bounding boxes)
            const waterExclusions = [
                // Great Lakes (North America)
                { latMin: 41, latMax: 49, lngMin: -93, lngMax: -82 },
                // Hudson Bay
                { latMin: 52, latMax: 63, lngMin: -95, lngMax: -77 },
                // Baltic Sea
                { latMin: 53, latMax: 66, lngMin: 10, lngMax: 30 },
                // Mediterranean Sea (main body)
                { latMin: 30, latMax: 38, lngMin: 0, lngMax: 35 },
                // Red Sea
                { latMin: 12, latMax: 30, lngMin: 32, lngMax: 45 },
                // Persian Gulf
                { latMin: 24, latMax: 31, lngMin: 47, lngMax: 57 },
                // Black Sea
                { latMin: 41, latMax: 47, lngMin: 28, lngMax: 42 },
                // Caspian Sea
                { latMin: 37, latMax: 47, lngMin: 46, lngMax: 55 },
                // Lake Victoria
                { latMin: -4, latMax: 1, lngMin: 32, lngMax: 37 },
            ];
            
            for (const water of waterExclusions) {
                if (lat >= water.latMin && lat <= water.latMax && 
                    lng >= water.lngMin && lng <= water.lngMax) {
                    return false;
                }
            }
            
            return false;
        }

        // Generate COMPLETE land coverage - no ocean hexes
        function generateLandHexagons() {
            const hexagons = [];
            let id = 1;
            
            // Dense 5-degree grid for complete coverage
            for (let lat = -75; lat <= 80; lat += 5) {
                for (let lng = -180; lng < 180; lng += 6) {
                    // Check if this point is on land
                    if (isLand(lat, lng)) {
                        // Add some variation to position
                        const finalLat = lat + (Math.random() - 0.5) * 2;
                        const finalLng = lng + (Math.random() - 0.5) * 2.5;
                        
                        // Determine rarity based on location
                        let rarity = 'common';
                        let price = 15 + Math.floor(Math.random() * 50);
                        let yield_rate = 2.0;
                        
                        // Polar regions = epic
                        if (Math.abs(lat) > 65) {
                            rarity = 'epic';
                            price = 200 + Math.floor(Math.random() * 300);
                            yield_rate = 4.0;
                        }
                        // Desert/remote = rare
                        else if (Math.abs(lat) > 45 || Math.abs(lng) > 130 || 
                                 (Math.abs(lat) < 25 && Math.abs(lng) < 60 && Math.abs(lat) > 15)) {
                            rarity = 'rare';
                            price = 60 + Math.floor(Math.random() * 100);
                            yield_rate = 3.0;
                        }
                        
                        hexagons.push({
                            id: id++,
                            lat: finalLat,
                            lng: finalLng,
                            name: `Hex-${id.toString().padStart(4, '0')}`,
                            rarity,
                            price,
                            yield: yield_rate,
                            owned: id === 2,
                            dailyRent: (price * (yield_rate / 100) / 365).toFixed(4)
                        });
                    }
                }
            }
            
            console.log(`Generated ${hexagons.length} land hexagons`);
            return hexagons;
        }

        const LAND_PARCELS = generateLandHexagons();

        function WorldMap({ lands, onSelect }) {
            useEffect(() => {
                const map = L.map('map', { center: [25, 10], zoom: 2, minZoom: 2, worldCopyJump: true });
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
                }).addTo(map);

                lands.forEach(land => {
                    const color = land.owned ? '#00ff88' : 
                                 land.rarity === 'epic' ? '#9945ff' : 
                                 land.rarity === 'rare' ? '#00d4ff' : '#666';
                    
                    const icon = L.divIcon({
                        className: 'custom-hex',
                        html: `<div class="hex-marker" style="background: ${color}; box-shadow: 0 0 6px ${color}"></div>`,
                        iconSize: [14, 14], iconAnchor: [7, 7]
                    });

                    L.marker([land.lat, land.lng], { icon })
                        .addTo(map)
                        .bindTooltip(`${land.name}<br>$${land.price} · ${land.rarity}${land.owned ? ' · OWNED' : ''}`, {direction: 'top'})
                        .on('click', () => onSelect(land));
                });

                return () => map.remove();
            }, [lands, onSelect]);

            return <div id="map" style={{flex: 1}} />;
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(LAND_PARCELS);

            const owned = lands.filter(l => l.owned);
            const totalValue = owned.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = owned.reduce((sum, l) => sum + parseFloat(l.dailyRent), 0).toFixed(4);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.id === land.id ? {...l, owned: true} : l));
                alert(`Bought ${land.name}!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <div style={{display: 'flex', gap: '2rem'}}>
                            <span>Land Hex: <strong style={{color: '#00d4ff'}}>{lands.length}</strong></span>
                            <span>Owned: <strong style={{color: '#00ff88'}}>{owned.length}</strong></span>
                            <span>Value: <strong style={{color: '#00d4ff'}}>${totalValue.toLocaleString()}</strong></span>
                            <span>Daily: <strong style={{color: '#00ff88'}}>${dailyRent}</strong></span>
                        </div>
                        <button className="wallet-btn">Connect Wallet</button>
                    </header>

                    <div className="main">
                        <WorldMap lands={lands} onSelect={setSelectedLand} />
                        <aside className="sidebar">
                            <h3 style={{color: '#888', marginBottom: '0.5rem', fontSize: '0.9rem', textTransform: 'uppercase'}}>
                                Land Coverage ({lands.length} hexagons)
                            </h3>
                            <div style={{fontSize: '0.8rem', color: '#00ff88', marginBottom: '1rem', padding: '0.5rem', background: 'rgba(0,255,136,0.1)', borderRadius: '6px'}}>
                                ✅ All hexagons are on LAND only
                            </div>
                            <div style={{maxHeight: 'calc(100vh - 200px)', overflowY: 'auto'}}>
                                {lands.slice(0, 100).map(land => (
                                    <div key={land.id} className={`land-item ${land.rarity}`} onClick={() => setSelectedLand(land)}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                            <span style={{fontWeight: 600}}>{land.name}</span>
                                            <span style={{color: land.rarity === 'epic' ? '#9945ff' : land.rarity === 'rare' ? '#00d4ff' : '#888', fontSize: '0.7rem', textTransform: 'uppercase'}}>{land.rarity}</span>
                                        </div>
                                        <div style={{fontSize: '0.85rem', color: '#888', marginTop: '0.25rem'}}>
                                            ${land.price} USDC · <span style={{color: '#00ff88'}}>+${land.dailyRent}/day</span>
                                        </div>
                                    </div>
                                ))}
                                {lands.length > 100 && (
                                    <div style={{textAlign: 'center', color: '#666', padding: '1rem', fontSize: '0.85rem'}}>
                                        ... and {lands.length - 100} more land hexagons
                                    </div>
                                )}
                            </div>
                        </aside>
                    </div>

                    {selectedLand && (
                        <div className="modal-overlay" onClick={() => setSelectedLand(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2 style={{color: '#00d4ff', marginBottom: '1.5rem'}}>{selectedLand.name}</h2>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Location</span>
                                    <span>{selectedLand.lat.toFixed(2)}°, {selectedLand.lng.toFixed(2)}°</span>
                                </div>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Rarity</span>
                                    <span style={{color: selectedLand.rarity === 'epic' ? '#9945ff' : selectedLand.rarity === 'rare' ? '#00d4ff' : '#888', textTransform: 'capitalize'}}>{selectedLand.rarity}</span>
                                </div>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Price</span>
                                    <span>${selectedLand.price} USDC</span>
                                </div>
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Annual Yield</span>
                                    <span style={{color: '#00ff88'}}>{selectedLand.yield}%</span>
                                </div>
                                <div style={{marginBottom: '1rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Daily Rent</span>
                                    <span style={{color: '#00ff88'}}>${selectedLand.dailyRent}</span>
                                </div>
                                {!selectedLand.owned && (
                                    <button className="buy-btn" onClick={() => {handleBuy(selectedLand); setSelectedLand(null);}}>
                                        Buy for ${selectedLand.price} USDC
                                    </button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
