<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Three.js for real 3D globe -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .main {
            flex: 1;
            display: flex;
            position: relative;
        }

        #globe-container {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, #0a0a1f 0%, #000 100%);
        }

        #globe-canvas {
            width: 100%;
            height: 100%;
        }

        .globe-overlay {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 1px solid #00d4ff;
            color: #888;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .sidebar {
            width: 380px;
            background: rgba(20, 20, 30, 0.95);
            border-left: 1px solid #2a2a3e;
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .land-count {
            color: #00d4ff;
            font-weight: bold;
        }

        .hex-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .hex-info-title {
            color: #00d4ff;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .land-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .land-item {
            background: linear-gradient(135deg, #1a1a2e 0%, #1e1e35 100%);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .land-item:hover {
            border-color: #00d4ff;
        }

        .land-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .land-item.epic::before { background: #9945ff; }
        .land-item.rare::before { background: #00d4ff; }
        .land-item.common::before { background: #888; }

        .land-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .land-name {
            font-weight: 600;
        }

        .land-rarity {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .land-rarity.common { background: #3a3a4e; color: #888; }
        .land-rarity.rare { background: #1a4a6e; color: #00d4ff; }
        .land-rarity.epic { background: #4a1a6e; color: #9945ff; }

        .land-yield {
            color: #00ff88;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            border: 1px solid #00d4ff;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            position: relative;
        }

        .modal-title {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2a3e;
        }

        .modal-label {
            color: #888;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LAND_PARCELS = [
            { id: 1, name: "New York City", lat: 40.7128, lng: -74.0060, rarity: "common", price: 100, yield: 2.0, owned: true },
            { id: 2, name: "Los Angeles", lat: 34.0522, lng: -118.2437, rarity: "common", price: 120, yield: 2.0, owned: false },
            { id: 3, name: "London", lat: 51.5074, lng: -0.1278, rarity: "common", price: 130, yield: 2.0, owned: false },
            { id: 4, name: "Tokyo", lat: 35.6762, lng: 139.6503, rarity: "common", price: 150, yield: 2.0, owned: false },
            { id: 5, name: "Sydney", lat: -33.8688, lng: 151.2093, rarity: "rare", price: 250, yield: 3.0, owned: false },
            { id: 6, name: "Rio de Janeiro", lat: -22.9068, lng: -43.1729, rarity: "rare", price: 180, yield: 3.0, owned: false },
            { id: 7, name: "Cape Town", lat: -33.9249, lng: 18.4241, rarity: "rare", price: 220, yield: 3.0, owned: false },
            { id: 8, name: "Dubai", lat: 25.2048, lng: 55.2708, rarity: "rare", price: 280, yield: 3.0, owned: false },
            { id: 9, name: "Singapore", lat: 1.3521, lng: 103.8198, rarity: "epic", price: 500, yield: 4.0, owned: false },
            { id: 10, name: "Iceland", lat: 64.9631, lng: -19.0208, rarity: "epic", price: 600, yield: 4.0, owned: false },
            { id: 11, name: "Antarctica", lat: -75.2509, lng: -0.0713, rarity: "epic", price: 800, yield: 4.0, owned: false },
            { id: 12, name: "Hawaii", lat: 19.8968, lng: -155.5828, rarity: "epic", price: 450, yield: 4.0, owned: false },
        ].map(l => ({...l, dailyRent: (l.price * (l.yield/100) / 365).toFixed(4)}));

        function latLngToVector3(lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        function Globe3D({ lands, onSelect }) {
            const containerRef = useRef(null);
            const sceneRef = useRef(null);
            const rendererRef = useRef(null);
            const cameraRef = useRef(null);
            const globeRef = useRef(null);
            const markersRef = useRef([]);
            const raycasterRef = useRef(new THREE.Raycaster());
            const mouseRef = useRef(new THREE.Vector2());
            const isDraggingRef = useRef(false);
            const previousMouseRef = useRef({ x: 0, y: 0 });

            useEffect(() => {
                // Scene setup
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x000000);
                sceneRef.current = scene;

                // Camera
                const camera = new THREE.PerspectiveCamera(45, containerRef.current.clientWidth / containerRef.current.clientHeight, 0.1, 1000);
                camera.position.z = 3;
                cameraRef.current = camera;

                // Renderer
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                containerRef.current.appendChild(renderer.domElement);
                rendererRef.current = renderer;

                // Earth
                const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
                const earthMaterial = new THREE.MeshPhongMaterial({
                    color: 0x1a3a5e,
                    emissive: 0x0a1a2e,
                    emissiveIntensity: 0.5,
                    shininess: 10
                });
                const earth = new THREE.Mesh(earthGeometry, earthMaterial);
                scene.add(earth);
                globeRef.current = earth;

                // Grid lines
                const gridGeometry = new THREE.SphereGeometry(1.01, 32, 32);
                const gridMaterial = new THREE.MeshBasicMaterial({
                    color: 0x00d4ff,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.1
                });
                const grid = new THREE.Mesh(gridGeometry, gridMaterial);
                scene.add(grid);

                // Atmosphere glow
                const atmosGeometry = new THREE.SphereGeometry(1.2, 32, 32);
                const atmosMaterial = new THREE.MeshBasicMaterial({
                    color: 0x00d4ff,
                    transparent: true,
                    opacity: 0.05,
                    side: THREE.BackSide
                });
                const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
                scene.add(atmosphere);

                // Lights
                const ambientLight = new THREE.AmbientLight(0x404040, 2);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(5, 3, 5);
                scene.add(directionalLight);

                // Stars
                const starsGeometry = new THREE.BufferGeometry();
                const starsCount = 2000;
                const posArray = new Float32Array(starsCount * 3);
                for(let i = 0; i < starsCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 100;
                }
                starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const starsMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff });
                const stars = new THREE.Points(starsGeometry, starsMaterial);
                scene.add(stars);

                // Hexagon markers
                lands.forEach(land => {
                    const hexGeometry = new THREE.CylinderGeometry(0.04, 0.04, 0.02, 6);
                    const color = land.owned ? 0x00ff88 : 
                                 land.rarity === 'epic' ? 0x9945ff : 
                                 land.rarity === 'rare' ? 0x00d4ff : 0x888888;
                    const hexMaterial = new THREE.MeshBasicMaterial({ color });
                    const hex = new THREE.Mesh(hexGeometry, hexMaterial);
                    
                    const pos = latLngToVector3(land.lat, land.lng, 1.02);
                    hex.position.copy(pos);
                    hex.lookAt(new THREE.Vector3(0, 0, 0));
                    hex.rotateX(Math.PI);
                    
                    hex.userData = { land };
                    scene.add(hex);
                    markersRef.current.push(hex);

                    // Glow effect
                    const glowGeometry = new THREE.CylinderGeometry(0.06, 0.06, 0.01, 6);
                    const glowMaterial = new THREE.MeshBasicMaterial({ 
                        color, 
                        transparent: true, 
                        opacity: 0.3 
                    });
                    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                    glow.position.copy(pos);
                    glow.lookAt(new THREE.Vector3(0, 0, 0));
                    glow.rotateX(Math.PI);
                    scene.add(glow);
                });

                // Animation loop
                let animationId;
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    if (!isDraggingRef.current) {
                        earth.rotation.y += 0.001;
                        grid.rotation.y += 0.001;
                        markersRef.current.forEach((marker, i) => {
                            const land = lands[i];
                            const pos = latLngToVector3(land.lat, land.lng, 1.02);
                            marker.position.copy(pos);
                            marker.lookAt(new THREE.Vector3(0, 0, 0));
                            marker.rotateX(Math.PI);
                        });
                    }
                    renderer.render(scene, camera);
                };
                animate();

                // Mouse events
                const handleMouseDown = (e) => {
                    isDraggingRef.current = true;
                    previousMouseRef.current = { x: e.clientX, y: e.clientY };
                };

                const handleMouseMove = (e) => {
                    if (!isDraggingRef.current) return;
                    const deltaX = e.clientX - previousMouseRef.current.x;
                    const deltaY = e.clientY - previousMouseRef.current.y;
                    earth.rotation.y += deltaX * 0.005;
                    earth.rotation.x += deltaY * 0.005;
                    grid.rotation.y = earth.rotation.y;
                    grid.rotation.x = earth.rotation.x;
                    previousMouseRef.current = { x: e.clientX, y: e.clientY };
                };

                const handleMouseUp = () => {
                    isDraggingRef.current = false;
                };

                const handleClick = (e) => {
                    if (isDraggingRef.current) return;
                    const rect = renderer.domElement.getBoundingClientRect();
                    mouseRef.current.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    mouseRef.current.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                    raycasterRef.current.setFromCamera(mouseRef.current, camera);
                    const intersects = raycasterRef.current.intersectObjects(markersRef.current);

                    if (intersects.length > 0) {
                        const land = intersects[0].object.userData.land;
                        onSelect(land);
                    }
                };

                renderer.domElement.addEventListener('mousedown', handleMouseDown);
                renderer.domElement.addEventListener('mousemove', handleMouseMove);
                renderer.domElement.addEventListener('mouseup', handleMouseUp);
                renderer.domElement.addEventListener('click', handleClick);

                // Resize handler
                const handleResize = () => {
                    camera.aspect = containerRef.current.clientWidth / containerRef.current.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('resize', handleResize);
                    renderer.domElement.removeEventListener('mousedown', handleMouseDown);
                    renderer.domElement.removeEventListener('mousemove', handleMouseMove);
                    renderer.domElement.removeEventListener('mouseup', handleMouseUp);
                    renderer.domElement.removeEventListener('click', handleClick);
                    renderer.dispose();
                    containerRef.current?.removeChild(renderer.domElement);
                };
            }, [lands, onSelect]);

            return (
                <div id="globe-container" ref={containerRef}>
                    <div className="loading">Loading 3D Globe...</div>
                </div>
            );
        }

        function Stats({ totalLand, totalValue, dailyRent }) {
            return (
                <div className="stats-bar">
                    <div className="stat">
                        <span>Land:</span>
                        <span className="stat-value">{totalLand}</span>
                    </div>
                    <div className="stat">
                        <span>Value:</span>
                        <span className="stat-value">${totalValue.toLocaleString()}</span>
                    </div>
                    <div className="stat">
                        <span>Daily:</span>
                        <span className="stat-value" style={{color: '#00ff88'}}>${dailyRent}</span>
                    </div>
                </div>
            );
        }

        function LandList({ lands, onSelect }) {
            const owned = lands.filter(l => l.owned);
            return (
                <div>
                    <div className="sidebar-title">
                        <span>Your Land</span>
                        <span className="land-count">{owned.length}</span>
                    </div>
                    <div className="hex-info">
                        <div className="hex-info-title">Hexagon Grid</div>
                        <div style={{fontSize: '0.85rem', color: '#aaa'}}>
                            Each hex represents a ~100km land parcel. Click hexagons on the globe to buy. Remote locations = higher rarity.
                        </div>
                    </div>
                    <div className="land-list">
                        {owned.map(land => (
                            <div key={land.id} className={`land-item ${land.rarity}`} onClick={() => onSelect(land)}>
                                <div className="land-header">
                                    <span className="land-name">{land.name}</span>
                                    <span className={`land-rarity ${land.rarity}`}>{land.rarity}</span>
                                </div>
                                <div style={{fontSize: '0.85rem', color: '#888'}}>
                                    ${land.price} · <span className="land-yield">+${land.dailyRent}/day</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function BuyModal({ land, onClose, onBuy }) {
            if (!land) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="close-btn" onClick={onClose}>×</button>
                        <h2 className="modal-title">{land.owned ? 'Your Land' : 'Buy Land'}</h2>
                        <div className="modal-row">
                            <span className="modal-label">Location</span>
                            <span className="modal-value">{land.name}</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Coordinates</span>
                            <span className="modal-value">{land.lat.toFixed(2)}, {land.lng.toFixed(2)}</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Rarity</span>
                            <span className="modal-value" style={{textTransform: 'capitalize', color: land.rarity === 'epic' ? '#9945ff' : land.rarity === 'rare' ? '#00d4ff' : '#888'}}>{land.rarity}</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Price</span>
                            <span className="modal-value">${land.price} USDC</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Annual Yield</span>
                            <span className="modal-value" style={{color: '#00ff88'}}>{land.yield}%</span>
                        </div>
                        {!land.owned && (
                            <button className="buy-btn" onClick={() => {onBuy(land); onClose();}}>
                                Buy for ${land.price} USDC
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(LAND_PARCELS);
            const [walletConnected, setWalletConnected] = useState(false);

            const owned = lands.filter(l => l.owned);
            const totalValue = owned.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = owned.reduce((sum, l) => sum + parseFloat(l.dailyRent), 0).toFixed(4);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.id === land.id ? {...l, owned: true} : l));
                alert(`Bought ${land.name}!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <Stats totalLand={owned.length} totalValue={totalValue} dailyRent={dailyRent} />
                        <button className="wallet-btn" onClick={() => setWalletConnected(!walletConnected)}>
                            {walletConnected ? '0x1234...5678' : 'Connect Wallet'}
                        </button>
                    </header>

                    <div className="main">
                        <Globe3D lands={lands} onSelect={setSelectedLand} />
                        <div className="globe-overlay">
                            <strong>Drag</strong> to rotate · <strong>Click hexagons</strong> to buy
                        </div>
                        <aside className="sidebar">
                            <LandList lands={lands} onSelect={setSelectedLand} />
                        </aside>
                    </div>

                    {selectedLand && (
                        <BuyModal 
                            land={selectedLand} 
                            onClose={() => setSelectedLand(null)}
                            onBuy={handleBuy}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
