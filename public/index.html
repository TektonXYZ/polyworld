<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - 900 Cities</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; }
        #root { width: 100vw; height: 100vh; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00d4ff; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #9945ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main { flex: 1; display: flex; overflow: hidden; }
        #map { flex: 1; background: #0a0a0f; }
        .sidebar { width: 400px; background: rgba(20, 20, 30, 0.98); border-left: 1px solid #2a2a3e; padding: 1rem; overflow-y: auto; z-index: 100; }
        .land-item { background: linear-gradient(135deg, #1a1a2e 0%, #1e1e35 100%); padding: 0.6rem; border-radius: 8px; border: 1px solid #2a2a3e; margin-bottom: 0.4rem; cursor: pointer; font-size: 0.85rem; }
        .land-item:hover { border-color: #00d4ff; }
        .land-item.epic { border-left: 3px solid #ffd700; }
        .land-item.rare { border-left: 3px solid #00d4ff; }
        .land-item.common { border-left: 3px solid #888; }
        .wallet-btn { background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 0.6rem 1.2rem; border-radius: 6px; color: #000; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .wallet-btn.connected { background: linear-gradient(135deg, #00ff88, #00cc6a); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 12px; border: 1px solid #00d4ff; padding: 1.5rem; max-width: 380px; width: 90%; }
        .buy-btn { width: 100%; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 0.8rem; border-radius: 6px; color: #000; font-weight: bold; cursor: pointer; margin-top: 0.8rem; }
        .hex-marker { width: 10px; height: 10px; background: currentColor; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); border: 1px solid rgba(255,255,255,0.3); cursor: pointer; }
        .hex-marker:hover { transform: scale(2); }
        .stats-bar { display: flex; gap: 1.5rem; font-size: 0.9rem; }
        .continent-filter { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .filter-btn { background: #2a2a3e; border: 1px solid #3a3a4e; color: #fff; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .filter-btn:hover, .filter-btn.active { background: #00d4ff; color: #000; }
        .city-count { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="cities-data.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Prices and yields based on population
        const TIERS = {
            high: { price: [500, 1000], apy: 4, color: '#ffd700', label: 'EPIC' },
            medium: { price: [200, 400], apy: 3, color: '#00d4ff', label: 'RARE' },
            low: { price: [50, 150], apy: 2, color: '#888888', label: 'COMMON' }
        };

        const CONTINENTS = ['All', 'North America', 'South America', 'Europe', 'Africa', 'Asia', 'Oceania'];

        function App() {
            const [wallet, setWallet] = useState(null);
            const [selectedCity, setSelectedCity] = useState(null);
            const [ownedLands, setOwnedLands] = useState([]);
            const [filter, setFilter] = useState('All');
            const [map, setMap] = useState(null);

            useEffect(() => {
                const mapInstance = L.map('map').setView([20, 0], 2);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy;OpenStreetMap, &copy;CartoDB'
                }).addTo(mapInstance);
                setMap(mapInstance);

                return () => mapInstance.remove();
            }, []);

            useEffect(() => {
                if (!map) return;

                WORLD_CITIES.forEach(city => {
                    const tier = TIERS[city.pop];
                    const price = Math.floor(Math.random() * (tier.price[1] - tier.price[0]) + tier.price[0]);
                    
                    const marker = L.circleMarker([city.lat, city.lng], {
                        radius: 6,
                        fillColor: tier.color,
                        color: '#fff',
                        weight: 1,
                        opacity: 0.8,
                        fillOpacity: 0.8
                    }).addTo(map);

                    marker.bindPopup(`<b>${city.name}</b><br/>${city.country}<br/>${tier.label} - $${price}`);
                    marker.on('click', () => setSelectedCity({...city, price}));
                });
            }, [map]);

            const connectWallet = async () => {
                if (window.solana) {
                    try {
                        const resp = await window.solana.connect();
                        setWallet(resp.publicKey.toString());
                    } catch (err) {
                        console.error('Wallet connection failed:', err);
                    }
                } else {
                    window.open('https://phantom.app/', '_blank');
                }
            };

            const buyLand = () => {
                if (!wallet || !selectedCity) return;
                setOwnedLands([...ownedLands, selectedCity]);
                setSelectedCity(null);
            };

            const filteredCities = useMemo(() => {
                return filter === 'All' ? WORLD_CITIES : WORLD_CITIES.filter(c => c.continent === filter);
            }, [filter]);

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">⚡ PolyWorld</div>
                        <div className="stats-bar">
                            <span><span className="city-count">{WORLD_CITIES.length}</span> Cities</span>
                            <span>Owned: {ownedLands.length}</span>
                        </div>
                        <button className={`wallet-btn ${wallet ? 'connected' : ''}`} onClick={connectWallet}>
                            {wallet ? wallet.slice(0, 6) + '...' + wallet.slice(-4) : 'Connect Phantom'}
                        </button>
                    </header>
                    <div className="main">
                        <div id="map"></div>
                        <div className="sidebar">
                            <div className="continent-filter">
                                {CONTINENTS.map(c => (
                                    <button key={c} className={`filter-btn ${filter === c ? 'active' : ''}`} onClick={() => setFilter(c)}>
                                        {c}
                                    </button>
                                ))}
                            </div>
                            <div>
                                {filteredCities.map((city, idx) => {
                                    const tier = TIERS[city.pop];
                                    const price = Math.floor(Math.random() * (tier.price[1] - tier.price[0]) + tier.price[0]);
                                    return (
                                        <div key={idx} className={`land-item ${city.pop}`} onClick={() => setSelectedCity({...city, price})}>
                                            <strong>{city.name}</strong> - {city.country}
                                            <br/><small style={{color: tier.color}}>{tier.label} • ${price} • {tier.apy}% APY</small>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    {selectedCity && (
                        <div className="modal-overlay" onClick={() => setSelectedCity(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2>{selectedCity.name}</h2>
                                <p>{selectedCity.country} • {selectedCity.continent}</p>
                                <p style={{color: TIERS[selectedCity.pop].color, fontSize: '1.2rem', fontWeight: 'bold'}}>
                                    {TIERS[selectedCity.pop].label}
                                </p>
                                <p>Price: <strong>${selectedCity.price}</strong></p>
                                <p>Daily Yield: <strong>${(selectedCity.price * TIERS[selectedCity.pop].apy / 365).toFixed(2)}</strong> ({TIERS[selectedCity.pop].apy}% APY)</p>
                                <button className="buy-btn" onClick={buyLand} disabled={!wallet}>
                                    {wallet ? 'Buy Land' : 'Connect Wallet to Buy'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
