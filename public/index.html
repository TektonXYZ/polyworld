<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.87.0/lib/index.iife.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; }
        #root { width: 100vw; height: 100vh; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00d4ff; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #9945ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main { flex: 1; display: flex; overflow: hidden; }
        #map { flex: 1; background: #0a0a0f; }
        .sidebar { width: 380px; background: rgba(20, 20, 30, 0.98); border-left: 1px solid #2a2a3e; padding: 1.5rem; overflow-y: auto; z-index: 100; }
        .land-item { background: linear-gradient(135deg, #1a1a2e 0%, #1e1e35 100%); padding: 0.75rem; border-radius: 10px; border: 1px solid #2a2a2e; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; }
        .land-item:hover { border-color: #00d4ff; transform: translateX(5px); }
        .land-item.epic { border-left: 3px solid #9945ff; }
        .land-item.rare { border-left: 3px solid #00d4ff; }
        .land-item.common { border-left: 3px solid #888; }
        .wallet-btn { background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 0.75rem 1.5rem; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .wallet-btn:hover { box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .wallet-btn.connected { background: linear-gradient(135deg, #00ff88, #00cc6a); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 16px; border: 1px solid #00d4ff; padding: 2rem; max-width: 420px; width: 90%; }
        .buy-btn { width: 100%; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; padding: 1rem; border-radius: 8px; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 1rem; }
        .buy-btn:disabled { background: #444; cursor: not-allowed; }
        .hex-marker { width: 16px; height: 16px; background: currentColor; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); border: 1px solid white; cursor: pointer; transition: transform 0.2s; }
        .hex-marker:hover { transform: scale(1.4); }
        .loading { display: flex; align-items: center; justify-content: center; height: 100px; color: #00d4ff; }
        .error { color: #ff4444; padding: 1rem; background: rgba(255, 68, 68, 0.1); border-radius: 8px; margin: 1rem 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: rgba(0, 212, 255, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid #00d4ff; }
        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 0.25rem; }
        .stat-value { font-size: 1.25rem; font-weight: bold; color: #00d4ff; }
        .connect-prompt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0, 0, 0, 0.9); padding: 2rem; border-radius: 12px; border: 1px solid #00d4ff; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { Connection, PublicKey, Transaction, SystemProgram, LAMPORTS_PER_SOL } = solanaWeb3;

        // API Configuration
        const API_URL = 'http://localhost:3001';
        const SOLANA_RPC = 'https://api.devnet.solana.com';

        // API Client
        const apiClient = {
            async getLand() {
                try {
                    const res = await fetch(`${API_URL}/api/land`);
                    return await res.json();
                } catch (e) {
                    console.error('API Error:', e);
                    return { land: [] };
                }
            },
            async getPortfolio(wallet) {
                try {
                    const res = await fetch(`${API_URL}/api/portfolio/${wallet}`);
                    return await res.json();
                } catch (e) {
                    return null;
                }
            },
            async buyLand(landId, wallet, signature) {
                const res = await fetch(`${API_URL}/api/land/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ land_id: landId, wallet_address: wallet, signature })
                });
                return await res.json();
            }
        };

        // Solana Wallet Hook
        function useSolanaWallet() {
            const [wallet, setWallet] = useState(null);
            const [connected, setConnected] = useState(false);
            const [balance, setBalance] = useState(0);

            const connect = async () => {
                if (window.solana && window.solana.isPhantom) {
                    try {
                        const resp = await window.solana.connect();
                        setWallet(resp.publicKey.toString());
                        setConnected(true);
                        
                        // Get balance
                        const connection = new Connection(SOLANA_RPC);
                        const bal = await connection.getBalance(resp.publicKey);
                        setBalance(bal / LAMPORTS_PER_SOL);
                    } catch (err) {
                        console.error('Connection error:', err);
                    }
                } else {
                    alert('Please install Phantom wallet!');
                    window.open('https://phantom.app/', '_blank');
                }
            };

            const disconnect = () => {
                if (window.solana) window.solana.disconnect();
                setWallet(null);
                setConnected(false);
                setBalance(0);
            };

            useEffect(() => {
                if (window.solana) {
                    window.solana.on('connect', () => setConnected(true));
                    window.solana.on('disconnect', () => setConnected(false));
                }
            }, []);

            return { wallet, connected, balance, connect, disconnect };
        }

        // Map Component
        function WorldMap({ lands, onSelect, loading }) {
            const mapRef = useRef(null);

            useEffect(() => {
                if (!lands.length) return;

                const map = L.map('map', { center: [30, 10], zoom: 2, minZoom: 2, worldCopyJump: true });
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
                }).addTo(map);

                lands.forEach(land => {
                    const color = land.owner_wallet ? '#00ff88' : 
                                 land.rarity === 'epic' ? '#9945ff' : 
                                 land.rarity === 'rare' ? '#00d4ff' : '#666';
                    
                    const icon = L.divIcon({
                        className: 'custom-hex',
                        html: `<div class="hex-marker" style="background: ${color}; box-shadow: 0 0 6px ${color}"></div>`,
                        iconSize: [16, 16], iconAnchor: [8, 8]
                    });

                    L.marker([land.lat, land.lng], { icon })
                        .addTo(map)
                        .bindTooltip(`${land.name}<br>$${land.price} · ${land.rarity}${land.owner_wallet ? ' · OWNED' : ''}`, {direction: 'top'})
                        .on('click', () => onSelect(land));
                });

                mapRef.current = map;
                return () => map.remove();
            }, [lands, onSelect]);

            if (loading) return <div className="loading">Loading land parcels...</div>;
            return <div id="map" style={{flex: 1}} />;
        }

        // Main App
        function App() {
            const [lands, setLands] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedLand, setSelectedLand] = useState(null);
            const [portfolio, setPortfolio] = useState(null);
            const [error, setError] = useState(null);
            const [buying, setBuying] = useState(false);
            
            const { wallet, connected, balance, connect, disconnect } = useSolanaWallet();

            // Load land data
            useEffect(() => {
                loadLandData();
            }, []);

            // Load portfolio when wallet connects
            useEffect(() => {
                if (connected && wallet) {
                    loadPortfolio(wallet);
                }
            }, [connected, wallet]);

            const loadLandData = async () => {
                setLoading(true);
                try {
                    const data = await apiClient.getLand();
                    setLands(data.land || []);
                } catch (e) {
                    setError('Failed to load land data');
                } finally {
                    setLoading(false);
                }
            };

            const loadPortfolio = async (walletAddress) => {
                try {
                    const data = await apiClient.getPortfolio(walletAddress);
                    setPortfolio(data);
                } catch (e) {
                    console.error('Portfolio load error:', e);
                }
            };

            const handleBuy = async () => {
                if (!selectedLand || !connected) return;
                
                setBuying(true);
                try {
                    // Simulate blockchain transaction
                    const mockSignature = 'tx_' + Date.now();
                    const result = await apiClient.buyLand(selectedLand.id, wallet, mockSignature);
                    
                    if (result.success) {
                        alert(`Successfully purchased ${selectedLand.name}!`);
                        await loadLandData();
                        await loadPortfolio(wallet);
                        setSelectedLand(null);
                    } else {
                        alert('Purchase failed: ' + result.error);
                    }
                } catch (e) {
                    alert('Transaction failed: ' + e.message);
                } finally {
                    setBuying(false);
                }
            };

            const ownedCount = lands.filter(l => l.owner_wallet).length;
            const myLand = lands.filter(l => l.owner_wallet === wallet);
            const myValue = myLand.reduce((sum, l) => sum + parseFloat(l.price_usd), 0);
            const myDaily = myLand.reduce((sum, l) => sum + parseFloat(l.dailyRent || 0), 0);

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <div style={{display: 'flex', gap: '2rem', alignItems: 'center'}}>
                            <div style={{fontSize: '0.9rem'}}>
                                Total: <strong style={{color: '#00d4ff'}}>{lands.length}</strong> | 
                                Owned: <strong style={{color: '#00ff88'}}>{ownedCount}</strong>
                            </div>
                            {connected && (
                                <div style={{fontSize: '0.85rem', color: '#888'}}>
                                    {wallet.slice(0, 6)}...{wallet.slice(-4)} | {balance.toFixed(3)} SOL
                                </div>
                            )}
                            <button 
                                className={`wallet-btn ${connected ? 'connected' : ''}`}
                                onClick={connected ? disconnect : connect}
                            >
                                {connected ? 'Connected' : 'Connect Phantom'}
                            </button>
                        </div>
                    </header>

                    <div className="main">
                        {loading ? (
                            <div className="loading" style={{flex: 1}}>Loading PolyWorld...</div>
                        ) : (
                            <WorldMap lands={lands} onSelect={setSelectedLand} loading={loading} />
                        )}
                        
                        <aside className="sidebar">
                            {connected && portfolio && (
                                <div className="stats-grid">
                                    <div className="stat-card">
                                        <div className="stat-label">Your Land</div>
                                        <div className="stat-value">{myLand.length}</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="stat-label">Value</div>
                                        <div className="stat-value">${myValue.toFixed(0)}</div>
                                    </div>
                                </div>
                            )}

                            <h3 style={{color: '#888', marginBottom: '1rem', fontSize: '0.9rem', textTransform: 'uppercase'}}>
                                {connected ? 'Your Portfolio' : 'Available Land'}
                            </h3>
                            
                            {error && <div className="error">{error}</div>}

                            <div style={{maxHeight: 'calc(100vh - 300px)', overflowY: 'auto'}}>
                                {(connected ? myLand : lands.slice(0, 50)).map(land => (
                                    <div key={land.id} className={`land-item ${land.rarity}`} onClick={() => setSelectedLand(land)}>
                                        <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                            <span style={{fontWeight: 600}}>{land.name}</span>
                                            <span style={{color: land.rarity === 'epic' ? '#9945ff' : land.rarity === 'rare' ? '#00d4ff' : '#888', fontSize: '0.7rem', textTransform: 'uppercase'}}>{land.rarity}</span>
                                        </div>
                                        <div style={{fontSize: '0.85rem', color: '#888', marginTop: '0.25rem'}}>
                                            ${land.price_usd} USDC · <span style={{color: '#00ff88'}}>+${land.dailyRent}/day</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>
                    </div>

                    {selectedLand && (
                        <div className="modal-overlay" onClick={() => setSelectedLand(null)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h2 style={{color: '#00d4ff', marginBottom: '1.5rem'}}>{selectedLand.name}</h2>
                                
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Location</span>
                                    <span>{parseFloat(selectedLand.lat).toFixed(2)}°, {parseFloat(selectedLand.lng).toFixed(2)}°</span>
                                </div>
                                
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Rarity</span>
                                    <span style={{color: selectedLand.rarity === 'epic' ? '#9945ff' : selectedLand.rarity === 'rare' ? '#00d4ff' : '#888', textTransform: 'capitalize'}}>{selectedLand.rarity}</span>
                                </div>
                                
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Price</span>
                                    <span>${selectedLand.price_usd} USDC</span>
                                </div>
                                
                                <div style={{marginBottom: '0.75rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Annual Yield</span>
                                    <span style={{color: '#00ff88'}}>{selectedLand.yield_annual}%</span>
                                </div>
                                
                                <div style={{marginBottom: '1rem', display: 'flex', justifyContent: 'space-between'}}>
                                    <span style={{color: '#888'}}>Daily Rent</span>
                                    <span style={{color: '#00ff88'}}>${selectedLand.dailyRent}</span>
                                </div>

                                {selectedLand.owner_wallet ? (
                                    <div style={{textAlign: 'center', color: '#00ff88', padding: '1rem', background: 'rgba(0, 255, 136, 0.1)', borderRadius: '8px'}}>
                                        ✓ Owned by {selectedLand.owner_wallet.slice(0, 6)}...{selectedLand.owner_wallet.slice(-4)}
                                    </div>
                                ) : (
                                    <button 
                                        className="buy-btn" 
                                        onClick={handleBuy}
                                        disabled={!connected || buying}
                                    >
                                        {!connected ? 'Connect Wallet to Buy' : buying ? 'Processing...' : `Buy for $${selectedLand.price_usd} USDC`}
                                    </button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
