<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- MapLibre GL JS (free Mapbox alternative with globe) -->
    <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet" />
    <!-- H3 Hexagon library -->
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wallet-btn:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .main {
            flex: 1;
            display: flex;
            position: relative;
        }

        #map {
            flex: 1;
            background: #0a0a0f;
        }

        .sidebar {
            width: 380px;
            background: rgba(20, 20, 30, 0.95);
            border-left: 1px solid #2a2a3e;
            padding: 1.5rem;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .sidebar-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .land-count {
            color: #00d4ff;
            font-weight: bold;
        }

        .land-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .land-item {
            background: linear-gradient(135deg, #1a1a2e 0%, #1e1e35 100%);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .land-item:hover {
            border-color: #00d4ff;
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .land-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #00d4ff;
        }

        .land-item.epic::before { background: #9945ff; }
        .land-item.rare::before { background: #00d4ff; }
        .land-item.common::before { background: #888; }

        .land-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .land-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .land-rarity {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .land-rarity.common { background: #3a3a4e; color: #888; }
        .land-rarity.rare { background: #1a4a6e; color: #00d4ff; }
        .land-rarity.epic { background: #4a1a6e; color: #9945ff; }

        .land-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
        }

        .land-yield {
            color: #00ff88;
            font-weight: 600;
        }

        .hex-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .hex-info-title {
            color: #00d4ff;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .hex-info-text {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            border: 1px solid #00d4ff;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.4);
        }

        .modal-title {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2a3e;
        }

        .modal-label {
            color: #888;
        }

        .modal-value {
            font-weight: 600;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buy-btn:hover {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
            transform: translateY(-2px);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #fff;
        }

        .globe-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #888;
            border: 1px solid #2a2a3e;
            pointer-events: none;
            z-index: 100;
        }

        .globe-hint strong {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Hexagon size: Resolution 5 = ~100km across (good balance)
        const H3_RESOLUTION = 5;

        // Generate sample hexagons on land
        const SAMPLE_HEXAGONS = [
            // North America
            { hex: '8529a3bffffffff', lat: 40.7, lng: -74.0, name: 'NYC Region', rarity: 'common', price: 100, yield: 2.0, owned: true },
            { hex: '8545a537ffffffff', lat: 34.0, lng: -118.2, name: 'Los Angeles', rarity: 'common', price: 120, yield: 2.0, owned: false },
            { hex: '856f2b47ffffffff', lat: 25.7, lng: -80.2, name: 'Miami Coast', rarity: 'rare', price: 200, yield: 3.0, owned: false },
            
            // South America
            { hex: '8585062bffffffff', lat: -23.5, lng: -46.6, name: 'São Paulo', rarity: 'common', price: 90, yield: 2.0, owned: false },
            { hex: '85831237ffffffff', lat: -34.6, lng: -58.3, name: 'Buenos Aires', rarity: 'rare', price: 180, yield: 3.0, owned: false },
            
            // Europe
            { hex: '85a1849bffffffff', lat: 51.5, lng: -0.1, name: 'London Area', rarity: 'common', price: 130, yield: 2.0, owned: false },
            { hex: '85a05947ffffffff', lat: 48.8, lng: 2.3, name: 'Paris Region', rarity: 'common', price: 140, yield: 2.0, owned: false },
            { hex: '85a42417ffffffff', lat: 41.9, lng: 12.5, name: 'Rome Area', rarity: 'epic', price: 300, yield: 4.0, owned: false },
            
            // Africa
            { hex: '85b4e76bffffffff', lat: -1.2, lng: 36.8, name: 'Nairobi', rarity: 'epic', price: 350, yield: 4.0, owned: false },
            { hex: '85b5ce6bffffffff', lat: -33.9, lng: 18.4, name: 'Cape Town', rarity: 'rare', price: 220, yield: 3.0, owned: false },
            
            // Asia
            { hex: '85c3075bffffffff', lat: 35.6, lng: 139.7, name: 'Tokyo Bay', rarity: 'common', price: 150, yield: 2.0, owned: false },
            { hex: '85c1e9c3ffffffff', lat: 39.9, lng: 116.4, name: 'Beijing Area', rarity: 'common', price: 110, yield: 2.0, owned: false },
            { hex: '85c2d4a7ffffffff', lat: 28.6, lng: 77.2, name: 'New Delhi', rarity: 'epic', price: 400, yield: 4.0, owned: false },
            { hex: '85c3441bffffffff', lat: 1.3, lng: 103.8, name: 'Singapore', rarity: 'epic', price: 500, yield: 4.0, owned: false },
            
            // Australia
            { hex: '85d4d4a3ffffffff', lat: -33.8, lng: 151.2, name: 'Sydney Harbor', rarity: 'rare', price: 250, yield: 3.0, owned: false },
            { hex: '85d4a7cbffffffff', lat: -37.8, lng: 144.9, name: 'Melbourne', rarity: 'common', price: 140, yield: 2.0, owned: false },
            
            // Remote/Premium
            { hex: '857b59c3ffffffff', lat: 64.1, lng: -21.9, name: 'Iceland', rarity: 'epic', price: 600, yield: 4.0, owned: false },
            { hex: '85f4d4afffffffff', lat: -77.8, lng: 166.6, name: 'Antarctica', rarity: 'epic', price: 800, yield: 4.0, owned: false },
            { hex: '8526365bffffffff', lat: 21.3, lng: -157.8, name: 'Hawaii', rarity: 'epic', price: 450, yield: 4.0, owned: false },
        ].map(h => ({
            ...h,
            dailyRent: (h.price * (h.yield / 100) / 365).toFixed(4)
        }));

        function Stats({ totalLand, totalValue, dailyRent }) {
            return (
                <div style={{display: 'flex', gap: '2rem'}}>
                    <div className="stat">
                        <span>Land:</span>
                        <span className="stat-value">{totalLand}</span>
                    </div>
                    <div className="stat">
                        <span>Value:</span>
                        <span className="stat-value">${totalValue.toLocaleString()}</span>
                    </div>
                    <div className="stat">
                        <span>Daily:</span>
                        <span className="stat-value" style={{color: '#00ff88'}}>${dailyRent}</span>
                    </div>
                </div>
            );
        }

        function LandList({ lands, onSelect }) {
            const owned = lands.filter(l => l.owned);
            return (
                <div>
                    <div className="sidebar-title">
                        <span>Your Hexagons</span>
                        <span className="land-count">{owned.length}</span>
                    </div>
                    
                    <div className="hex-info">
                        <div className="hex-info-title">Hexagon Size</div>
                        <div className="hex-info-text">
                            Each hexagon covers ~100km across. The entire planet's land area is divided into these hex parcels. Remote locations are rarer and pay higher yield.
                        </div>
                    </div>

                    <div className="land-list">
                        {owned.map(land => (
                            <div key={land.hex} className={`land-item ${land.rarity}`} onClick={() => onSelect(land)}>
                                <div className="land-header">
                                    <span className="land-name">{land.name}</span>
                                    <span className={`land-rarity ${land.rarity}`}>{land.rarity}</span>
                                </div>
                                <div className="land-details">
                                    <span>${land.price} USDC</span>
                                    <span className="land-yield">+${land.dailyRent}/day</span>
                                </div>
                            </div>
                        ))}
                        {owned.length === 0 && (
                            <div style={{color: '#888', textAlign: 'center', padding: '2rem'}}>
                                Click a hexagon on the globe to buy your first land parcel!
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function GlobeMap({ lands, onSelect }) {
            const mapContainer = useRef(null);
            const map = useRef(null);

            useEffect(() => {
                // Initialize MapLibre with globe projection
                map.current = new maplibregl.Map({
                    container: mapContainer.current,
                    style: {
                        version: 8,
                        sources: {
                            'osm': {
                                type: 'raster',
                                tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
                                tileSize: 256,
                                attribution: '&copy; OpenStreetMap &copy; CARTO'
                            }
                        },
                        layers: [{
                            id: 'osm',
                            type: 'raster',
                            source: 'osm',
                            paint: {
                                'raster-opacity': 0.6
                            }
                        }]
                    },
                    center: [0, 20],
                    zoom: 1.5,
                    projection: 'globe'  // This enables the 3D globe!
                });

                // Add atmosphere and stars
                map.current.on('load', () => {
                    map.current.setFog({
                        'color': '#0a0a1f',
                        'high-color': '#1a1a3e',
                        'space-color': '#000000',
                        'horizon-blend': 0.1,
                        'star-intensity': 0.8
                    });

                    // Add hexagon markers
                    lands.forEach(land => {
                        const color = land.owned ? '#00ff88' : 
                                     land.rarity === 'epic' ? '#9945ff' : 
                                     land.rarity === 'rare' ? '#00d4ff' : '#888';
                        
                        // Create hexagon-shaped marker
                        const el = document.createElement('div');
                        el.className = 'hex-marker';
                        el.style.cssText = `
                            width: 24px;
                            height: 24px;
                            background: ${color};
                            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
                            border: 2px solid #fff;
                            cursor: pointer;
                            transition: all 0.3s;
                            box-shadow: 0 0 10px ${color}80;
                        `;
                        el.onmouseenter = () => {
                            el.style.transform = 'scale(1.3)';
                            el.style.boxShadow = `0 0 20px ${color}`;
                        };
                        el.onmouseleave = () => {
                            el.style.transform = 'scale(1)';
                            el.style.boxShadow = `0 0 10px ${color}80`;
                        };

                        const marker = new maplibregl.Marker({ element: el })
                            .setLngLat([land.lng, land.lat])
                            .setPopup(new maplibregl.Popup().setHTML(`
                                <div style="color: #000; padding: 8px;">
                                    <b>${land.name}</b><br/>
                                    ${land.rarity.toUpperCase()} · $${land.price}
                                </div>
                            `))
                            .addTo(map.current);

                        el.addEventListener('click', () => onSelect(land));
                    });
                });

                return () => map.current?.remove();
            }, [lands, onSelect]);

            return (
                <div style={{flex: 1, position: 'relative'}}>
                    <div ref={mapContainer} id="map" style={{width: '100%', height: '100%'}} />
                    <div className="globe-hint">
                        <strong>Scroll</strong> to zoom · <strong>Drag</strong> to rotate · Click <strong>hexagons</strong> to buy
                    </div>
                </div>
            );
        }

        function BuyModal({ land, onClose, onBuy }) {
            if (!land) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="close-btn" onClick={onClose}>×</button>
                        <h2 className="modal-title">{land.owned ? 'Your Hexagon' : 'Buy Hexagon'}</h2>
                        
                        <div className="modal-row">
                            <span className="modal-label">Location</span>
                            <span className="modal-value">{land.name}</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Hex ID</span>
                            <span className="modal-value" style={{fontSize: '0.8rem', color: '#666'}}>{land.hex}</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Rarity</span>
                            <span className="modal-value" style={{textTransform: 'capitalize', color: 
                                land.rarity === 'epic' ? '#9945ff' : 
                                land.rarity === 'rare' ? '#00d4ff' : '#888'
                            }}>{land.rarity}</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Size</span>
                            <span className="modal-value">~100 km across</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Price</span>
                            <span className="modal-value">${land.price} USDC</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Annual Yield</span>
                            <span className="modal-value" style={{color: '#00ff88'}}>{land.yield}%</span>
                        </div>
                        
                        <div className="modal-row">
                            <span className="modal-label">Daily Rent</span>
                            <span className="modal-value" style={{color: '#00ff88'}}>${land.dailyRent}/day</span>
                        </div>

                        {!land.owned && (
                            <button className="buy-btn" onClick={() => {onBuy(land); onClose();}}>
                                Buy for ${land.price} USDC
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(SAMPLE_HEXAGONS);
            const [walletConnected, setWalletConnected] = useState(false);

            const owned = lands.filter(l => l.owned);
            const totalValue = owned.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = owned.reduce((sum, l) => sum + parseFloat(l.dailyRent), 0).toFixed(4);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.hex === land.hex ? {...l, owned: true} : l));
                alert(`Bought ${land.name} hexagon!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <Stats totalLand={owned.length} totalValue={totalValue} dailyRent={dailyRent} />
                        <button className="wallet-btn" onClick={() => setWalletConnected(!walletConnected)}>
                            {walletConnected ? '0x1234...5678' : 'Connect Wallet'}
                        </button>
                    </header>

                    <div className="main">
                        <GlobeMap lands={lands} onSelect={setSelectedLand} />
                        <aside className="sidebar">
                            <LandList lands={lands} onSelect={setSelectedLand} />
                        </aside>
                    </div>

                    {selectedLand && (
                        <BuyModal 
                            land={selectedLand} 
                            onClose={() => setSelectedLand(null)}
                            onBuy={handleBuy}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
