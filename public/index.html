<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyWorld - Virtual Land</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wallet-btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wallet-btn:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: #14141e;
            border-right: 1px solid #2a2a3e;
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .land-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .land-item {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            transition: all 0.3s;
        }

        .land-item:hover {
            border-color: #00d4ff;
            background: #1e1e35;
        }

        .land-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .land-name {
            font-weight: 600;
        }

        .land-rarity {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .land-rarity.common { background: #3a3a4e; color: #888; }
        .land-rarity.rare { background: #1a4a6e; color: #00d4ff; }
        .land-rarity.epic { background: #4a1a6e; color: #9945ff; }

        .land-details {
            font-size: 0.85rem;
            color: #888;
        }

        .land-yield {
            color: #00ff88;
        }

        #map {
            flex: 1;
            background: #0a0a0f;
        }

        /* Custom map styling */
        .leaflet-container {
            background: #0a0a0f;
        }

        .land-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .land-marker:hover {
            transform: scale(1.3);
            box-shadow: 0 0 15px currentColor;
        }

        .land-marker.common { background: #888; }
        .land-marker.rare { background: #00d4ff; }
        .land-marker.epic { background: #9945ff; }
        .land-marker.owned { background: #00ff88; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #00d4ff;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #9945ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #2a2a3e;
        }

        .modal-label {
            color: #888;
        }

        .modal-value {
            font-weight: 600;
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MOCK_LAND = [
            { id: 1, name: "NYC Financial District", lat: 40.7074, lng: -74.0113, rarity: "common", price: 100, yield: 2.0, owned: true, dailyRent: 0.0055 },
            { id: 2, name: "Antarctica Research Station", lat: -77.8458, lng: 166.6860, rarity: "epic", price: 500, yield: 4.0, owned: false, dailyRent: 0.055 },
            { id: 3, name: "Tokyo Shibuya", lat: 35.6595, lng: 139.7004, rarity: "common", price: 120, yield: 2.0, owned: false, dailyRent: 0.0066 },
            { id: 4, name: "Sahara Desert Oasis", lat: 23.4162, lng: 25.6628, rarity: "rare", price: 250, yield: 3.0, owned: false, dailyRent: 0.0205 },
            { id: 5, name: "Amazon Rainforest", lat: -3.4653, lng: -62.2159, rarity: "rare", price: 180, yield: 3.0, owned: false, dailyRent: 0.0148 },
            { id: 6, name: "Sydney Opera House", lat: -33.8568, lng: 151.2153, rarity: "common", price: 150, yield: 2.0, owned: false, dailyRent: 0.0082 },
            { id: 7, name: "Mount Everest Base", lat: 28.0014, lng: 86.9282, rarity: "epic", price: 600, yield: 4.0, owned: false, dailyRent: 0.0658 },
            { id: 8, name: "London Big Ben", lat: 51.5007, lng: -0.1246, rarity: "common", price: 130, yield: 2.0, owned: false, dailyRent: 0.0071 },
        ];

        function Stats({ totalLand, totalValue, dailyRent }) {
            return (
                <div>
                    <div className="sidebar-title">Your Portfolio</div>
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Land Owned</div>
                            <div className="stat-value">{totalLand}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Total Value</div>
                            <div className="stat-value">${totalValue}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Daily Rent</div>
                            <div className="stat-value" style={{color: '#00ff88'}}>${dailyRent}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">APY</div>
                            <div className="stat-value">2.8%</div>
                        </div>
                    </div>
                </div>
            );
        }

        function LandList({ lands, onSelect }) {
            const owned = lands.filter(l => l.owned);
            return (
                <div>
                    <div className="sidebar-title">Your Land</div>
                    <div className="land-list">
                        {owned.map(land => (
                            <div key={land.id} className="land-item" onClick={() => onSelect(land)}>
                                <div className="land-header">
                                    <span className="land-name">{land.name}</span>
                                    <span className={`land-rarity ${land.rarity}`}>{land.rarity}</span>
                                </div>
                                <div className="land-details">
                                    ${land.price} · <span className="land-yield">+${land.dailyRent}/day</span>
                                </div>
                            </div>
                        ))}
                        {owned.length === 0 && (
                            <div style={{color: '#888', textAlign: 'center', padding: '2rem'}}>
                                Click land on map to buy!
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function WorldMap({ lands, onSelect }) {
            const mapRef = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                // Initialize Leaflet map
                const map = L.map('map', {
                    center: [20, 0],
                    zoom: 2,
                    minZoom: 2,
                    worldCopyJump: true
                });

                // Add dark theme tile layer (CartoDB Dark Matter)
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(map);

                // Add markers for each land parcel
                lands.forEach(land => {
                    const colorClass = land.owned ? 'owned' : land.rarity;
                    
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="land-marker ${colorClass}"></div>`,
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    const marker = L.marker([land.lat, land.lng], { icon })
                        .addTo(map)
                        .bindPopup(`<b>${land.name}</b><br>$${land.price} - ${land.rarity}`);

                    marker.on('click', () => onSelect(land));
                    markersRef.current.push(marker);
                });

                mapRef.current = map;

                return () => {
                    map.remove();
                };
            }, [lands, onSelect]);

            return <div id="map"></div>;
        }

        function BuyModal({ land, onClose, onBuy }) {
            if (!land) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="close-btn" onClick={onClose}>×</button>
                        <h2 className="modal-title">{land.owned ? 'Your Land' : 'Buy Land'}</h2>
                        <div className="modal-row">
                            <span className="modal-label">Location</span>
                            <span className="modal-value">{land.name}</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Rarity</span>
                            <span className="modal-value" style={{textTransform: 'capitalize'}}>{land.rarity}</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Price</span>
                            <span className="modal-value">${land.price} USDC</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Annual Yield</span>
                            <span className="modal-value" style={{color: '#00ff88'}}>{land.yield}%</span>
                        </div>
                        <div className="modal-row">
                            <span className="modal-label">Daily Rent</span>
                            <span className="modal-value" style={{color: '#00ff88'}}>${land.dailyRent}/day</span>
                        </div>
                        {!land.owned && (
                            <button className="buy-btn" onClick={() => {onBuy(land); onClose();}}>
                                Buy for ${land.price} USDC
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [selectedLand, setSelectedLand] = useState(null);
            const [lands, setLands] = useState(MOCK_LAND);
            const [walletConnected, setWalletConnected] = useState(false);

            const owned = lands.filter(l => l.owned);
            const totalValue = owned.reduce((sum, l) => sum + l.price, 0);
            const dailyRent = owned.reduce((sum, l) => sum + l.dailyRent, 0);

            const handleBuy = (land) => {
                setLands(lands.map(l => l.id === land.id ? {...l, owned: true} : l));
                alert(`Bought ${land.name} for $${land.price} USDC!`);
            };

            return (
                <div className="app">
                    <header className="header">
                        <div className="logo">PolyWorld</div>
                        <button className="wallet-btn" onClick={() => setWalletConnected(!walletConnected)}>
                            {walletConnected ? '0x1234...5678' : 'Connect Wallet'}
                        </button>
                    </header>

                    <div className="main">
                        <aside className="sidebar">
                            <Stats totalLand={owned.length} totalValue={totalValue} dailyRent={dailyRent.toFixed(4)} />
                            <LandList lands={lands} onSelect={setSelectedLand} />
                        </aside>

                        <WorldMap lands={lands} onSelect={setSelectedLand} />
                    </div>

                    {selectedLand && (
                        <BuyModal 
                            land={selectedLand} 
                            onClose={() => setSelectedLand(null)}
                            onBuy={handleBuy}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
